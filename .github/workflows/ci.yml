name: Validate site

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate spec quality
        run: npm run validate:spec-quality

      - name: Validate portal discovery metadata
        run: npm run validate:portal-discovery

      - name: Validate generated site data
        run: npm run validate:site-data

      - name: Build site
        run: npm run build

      - name: Typecheck
        run: npm run typecheck
