name: Validate site

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6

      - name: Setup Node.js
        uses: actions/setup-node@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Typecheck
        run: npm run typecheck
