name: Validate checked-in Postman collections

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: postman-collections
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate collections
        run: npm run generate:postman

      - name: Ensure checked-in collections are current
        run: |
          git --no-pager status --short postman/collections
          git --no-pager diff --exit-code -- postman/collections
