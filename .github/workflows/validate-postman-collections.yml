name: Validate checked-in Postman collections

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate collections
        run: npm run generate:postman

      - name: Ensure checked-in collections are current
        run: |
          git --no-pager status --short postman/collections
          git --no-pager diff --exit-code -- postman/collections
