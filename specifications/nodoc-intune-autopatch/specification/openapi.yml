openapi: 3.0.1
info:
  title: Intune Autopatch
  x-nodoc-category: Intune
  description: |
    The Intune Autopatch API is used by Windows Autopatch experiences inside the Microsoft
    Intune admin center. The live surface is hosted on `services.autopatch.microsoft.com` and
    backs blades such as:

      - Windows Autopatch > Autopatch groups
      - Reports > Windows quality updates
      - Reports > Windows feature updates
      - Windows Autopatch > Messages
      - Windows Autopatch > Support requests
      - Windows Autopatch > Tenant management
      - Roles > Windows Autopatch roles

    Real tenant traffic confirmed the main tenant, reporting, support, and role-management
    endpoints. A second pass mined the loaded `hosting.portal.azure.net/modernworkplace/*`
    bundles for additional concrete GET paths under `/access-control/` and `/support/`, then
    validated those with token-backed GET probes using the same browser session.

    A later report-focused pass captured live request and response samples for the Windows
    quality updates and Windows feature updates blades, then safely probed hidden sibling read
    routes recovered from the same blade bundles. That work confirmed the live
    `/reporting/reports/v2/*` report families plus alternate
    `/unified-reporting/odata/1.0/WindowsFeatureUpdates*` resources.

    A related path, `GET /support/v1.0/Tenants/PreOnboardTenant`, returned `405 Method Not Allowed`
    during probing and is therefore treated as a likely write-oriented onboarding flow rather than
    documented as a confirmed GET operation here.

    Requests use a browser-obtained bearer token together with portal headers such as
    `x-ms-client-request-id`, `x-ms-client-session-id`, and `x-ms-effective-locale`.

    Documentation and specifications have been provided on a best-efforts basis and may not be
    100% accurate.
  version: 0.1.0
  contact:
    name: nodoc
    url: https://github.com/nathanmcnulty/nodoc
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://services.autopatch.microsoft.com
    description: Windows Autopatch API used by the Intune admin center
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Browser-obtained bearer token used by Windows Autopatch blades in the Intune admin
        center. Observed requests also include portal headers such as `x-ms-client-request-id`,
        `x-ms-client-session-id`, and `x-ms-effective-locale`.
  parameters:
    count:
      name: $count
      in: query
      description: Whether to include an OData count in the response.
      schema:
        type: boolean
    filter:
      name: $filter
      in: query
      description: OData filter expression.
      schema:
        type: string
    orderBy:
      name: $orderby
      in: query
      description: OData sort expression.
      schema:
        type: string
    top:
      name: $top
      in: query
      description: Maximum number of results to return.
      schema:
        type: integer
    skip:
      name: $skip
      in: query
      description: Number of results to skip.
      schema:
        type: integer
    select:
      name: $select
      in: query
      description: OData projection expression.
      schema:
        type: string
    permission:
      name: permission
      in: query
      required: true
      description: Access-control permission name to evaluate.
      schema:
        type: string
        example: Microsoft.Autopatch_Roles_Read
    roleAssignmentsFilter:
      name: $filter
      in: query
      required: true
      description: |
        Required role assignment filter. Observed and bundle-confirmed pattern:
        `RoleId eq {roleDefinitionId}`.
      schema:
        type: string
        example: RoleId eq 1477f34a-94a3-489b-8be5-1f6789424e11
    plan:
      name: plan
      in: path
      required: true
      description: Managed service plan identifier.
      schema:
        $ref: '#/components/schemas/ManagedServicePlan'
    adminAction:
      name: adminAction
      in: query
      required: true
      description: Tenant admin action identifier to evaluate.
      schema:
        type: string
        example: ClientBrokerInstall
    tenantSettingName:
      name: name
      in: query
      required: true
      description: Tenant setting name to retrieve.
      schema:
        type: string
        example: showDeviceUsageData
    supportRequestId:
      name: supportRequestId
      in: path
      required: true
      description: Windows Autopatch support request identifier.
      schema:
        type: string
        format: uuid
    reportApiVersion2:
      name: api-version
      in: query
      required: true
      description: Reporting API version used by the report POST routes.
      schema:
        type: string
        enum: ['2.0']
        default: '2.0'
    reportApiVersion1:
      name: api-version
      in: query
      required: true
      description: Reporting API version used by the export status helper.
      schema:
        type: string
        enum: ['1.0']
        default: '1.0'
    includeHistoricalValue:
      name: includeHistoricalValue
      in: query
      required: true
      description: Whether historical values should be included in distinct-column responses.
      schema:
        type: boolean
        default: false
    hotpatched:
      name: hotpatched
      in: query
      required: false
      description: Restrict quality update distinct-column results to hotpatch-specific values.
      schema:
        type: boolean
    exportQueryName:
      name: queryName
      in: query
      required: true
      description: Export query identifier returned by the report blade bundle.
      schema:
        type: string
        example: DeviceFeatureUpdatesDetailsQuery
    exportQueryVersion:
      name: queryVersion
      in: query
      required: true
      description: Export query version used by the report blade bundle.
      schema:
        type: string
        example: '1.0'
        default: '1.0'
    exportTrackingId:
      name: trackingId
      in: query
      required: true
      description: Tracking identifier returned by a `detailsExport` POST.
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Authentication is required or the browser token is no longer valid.
    Forbidden:
      description: The authenticated principal does not have access to the requested Autopatch data.
    BadRequest:
      description: The request shape or parameters were invalid.
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    ODataGenericCollection:
      type: object
      properties:
        '@odata.context':
          type: string
        '@odata.count':
          type: integer
        value:
          type: array
          items:
            $ref: '#/components/schemas/GenericObject'
      required:
        - '@odata.context'
        - value
    ODataStringCollection:
      type: object
      properties:
        '@odata.context':
          type: string
        value:
          type: array
          items:
