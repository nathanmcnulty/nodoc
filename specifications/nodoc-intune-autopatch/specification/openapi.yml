tags:
  - name: Platform
    description: Shared platform-level endpoints and feature flags used by Autopatch blades.
  - name: Tenant
    description: Tenant enrollment, enablement, and tenant-level action state.
  - name: Roles
    description: Windows Autopatch access-control and custom role operations.
  - name: AutopatchGroups
    description: Windows Autopatch group definitions and related reporting.
  - name: Messages
    description: Customer communications and message feed operations.
  - name: Support
    description: Support request listing, entitlement lookup, and request metadata.
  - name: Reporting
    description: Windows quality and feature update reporting endpoints, distinct filters, and exports.
x-tagGroups:
  - name: Platform
    tags: [Platform]
  - name: Tenant
    tags: [Tenant]
  - name: Roles
    tags: [Roles]
  - name: Windows Autopatch
    tags: [AutopatchGroups, Messages, Support, Reporting]
externalDocs:
  description: Checked-in source specification and supporting modules.
  url: https://github.com/nathanmcnulty/nodoc/tree/main/specifications/nodoc-intune-autopatch/specification

paths:
  /api/Flighting:
    get:
      tags: [Platform]
      summary: Get Autopatch feature flags
      description: |
        Returns Windows Autopatch feature flags and rollout toggles used across tenant
        administration blades. Confirmed live across every Windows Autopatch-related blade.
      operationId: IntuneAutopatch.Platform.GetFlighting
      responses:
        '200':
          description: Feature flags returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightingResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1.0/tenant/resolve:
    get:
      tags: [Tenant]
      summary: Resolve tenant enrollment state
      description: |
        Returns Windows Autopatch tenant enrollment and plan state. Confirmed live on messages
        and help/support blades and further confirmed with a token-backed GET probe.
      operationId: IntuneAutopatch.Tenant.Resolve
      responses:
        '200':
          description: Tenant state returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResolveResponse'
              example:
                isNotFound: false
                isOnboarded: true
                isEnrolled: true
                isEnrolling: false
                isDisabled: false
                appPackagingEnrolled: false
                plans:
                  - plan: Starter
                    state: Enrolled
                    onboardedTimestampUtc: '2024-01-23T17:30:01.9540831'
                    partiallyEnrolledTimestampUtc: '2024-01-23T17:30:16.9152133'
                    enrolledTimestampUtc: '2024-01-23T17:36:22.6092727'
                    enrollmentType: ClassicEnrollment
                    failedEnrollmentAttempts: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tenant-management/v1/Enrollment/Starter/featureEnablementStatus:
    get:
      tags: [Tenant]
      summary: Get starter feature enablement status
      description: |
        Returns tenant onboarding, Autopatch enablement, and subscription summary details for the
        Starter plan. Confirmed live on many tenant-administration blades and validated again with
        a GET probe.
      operationId: IntuneAutopatch.Tenant.GetFeatureEnablementStatus
      responses:
        '200':
          description: Starter feature enablement status returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureEnablementStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tenant-management/v2/AdminActionsV:
    get:
      tags: [Tenant]
      summary: Get tenant admin actions
      description: |
        Returns Windows Autopatch tenant-level admin actions such as client broker install tasks.
        Confirmed live on the Tenant management blade and validated with a GET probe.
      operationId: IntuneAutopatch.Tenant.ListAdminActions
      responses:
        '200':
          description: Admin actions returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminAction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Tenant]
      summary: Submit tenant admin actions
      description: |
        Submits one or more Windows Autopatch tenant admin actions such as
        `ClientBrokerInstall`. The call was recovered from the Tenant management bundle and
        corroborated by a live install flow in the Intune admin center that changed the
        `ClientBrokerInstall` row from `NotStarted` to `Pending`, then redirected the portal to
        `ClientBroker.ReactView`.

        The exact success status code and response body were not captured during the live flow;
        after submission the portal polls `GET /tenant-management/v2/AdminActionsV/actionStatus`
        for per-action state.
      operationId: IntuneAutopatch.Tenant.SubmitAdminActions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AdminAction'
      responses:
        default:
          description: Action submission response returned by the service.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tenant-management/v2/AdminActionsV/actionStatus:
    get:
      tags: [Tenant]
      summary: Get tenant admin action status
      description: |
        Returns the current state for a submitted Windows Autopatch tenant admin action.
        Confirmed live from the client broker install flow, which polled
        `adminAction=ClientBrokerInstall` after submission and returned `Failed`.
      operationId: IntuneAutopatch.Tenant.GetAdminActionStatus
      parameters:
        - $ref: '#/components/parameters/adminAction'
      responses:
        '200':
          description: Admin action state returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminActionStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /update-management/partnergraph/1.0/tenantSettings/mdmAppSettings:
    get:
      tags: [Tenant]
      summary: Get MDM app tenant settings
      description: |
        Returns tenant MDM application settings exposed through the Windows Autopatch update
        management surface. Confirmed live on the Tenant management blade and validated with a
        GET probe.
      operationId: IntuneAutopatch.Tenant.GetMdmAppSettings
      responses:
        '200':
          description: Tenant MDM app settings returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ODataGenericCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /access-control/odata/v1/EffectivePermissions:
    get:
      tags: [Roles]
      summary: Get effective permissions
      description: |
        Returns the caller's effective Windows Autopatch permissions. Confirmed live from the
        roles blade.
      operationId: IntuneAutopatch.Roles.GetEffectivePermissions
      responses:
        '200':
          description: Effective permissions returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ODataStringCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /access-control/odata/v1/ResourceOperations:
    get:
      tags: [Roles]
      summary: List resource operations
      description: |
        Lists Windows Autopatch resource operations and verbs. Recovered from the
        `modernworkplace` bundles and confirmed with a GET probe.
      operationId: IntuneAutopatch.Roles.ListResourceOperations
      responses:
        '200':
          description: Resource operations returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceOperationCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /access-control/odata/v1/RoleDefinitions:
    get:
      tags: [Roles]
      summary: List role definitions
      description: |
        Lists Windows Autopatch built-in and custom role definitions. Confirmed live from the
        roles blade and further grounded with a GET probe.
      operationId: IntuneAutopatch.Roles.ListRoleDefinitions
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/orderBy'
      responses:
        '200':
          description: Role definitions returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleDefinitionCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /access-control/odata/v1/RoleAssignments:
    get:
      tags: [Roles]
      summary: List role assignments
      description: |
        Lists Windows Autopatch role assignments for a specific role definition. The bundle
        requires `$filter=RoleId eq {roleDefinitionId}`; probing without it returns
        `400 Please provide RoleId in $filter`.
      operationId: IntuneAutopatch.Roles.ListRoleAssignments
      parameters:
        - $ref: '#/components/parameters/roleAssignmentsFilter'
        - $ref: '#/components/parameters/orderBy'
      responses:
        '200':
          description: Role assignments returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ODataGenericCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /access-control/odata/v1/ScopeTags:
    get:
      tags: [Roles]
      summary: Get scope tags for a permission
      description: |
        Returns scope tags applicable to a Windows Autopatch permission. Recovered from the roles
        bundle and confirmed with a GET probe.
