openapi: 3.0.1
info:
  title: Defender XDR
  description: |
    The Defender XDR API is used by the Microsoft Defender XDR portal (security.microsoft.com) for managing security operations, including:

      - Alerts and Incidents
      - Advanced Hunting
      - Endpoint Device Management (MDE)
      - Live Response
      - Endpoint Configuration
      - Vulnerability Management (TVM)
      - Identity Protection (MDI)
      - Configuration and Settings
      - Exposure Management and XSPM
      - Data Lake and Analytics
      - Threat Analytics
      - Action Center
      - Multi-Tenant Operations
      - Streaming API

    These APIs are accessed through the portal's API proxy layer at `security.microsoft.com/apiproxy` and support delegated authentication flows.
    They are used internally by the Defender XDR portal and are not officially documented by Microsoft.

    The proxy layer routes requests to various backend services using path prefixes:

    | Prefix | Service |
    | --- | --- |
    | `/mtp/` | Microsoft Threat Protection |
    | `/mdi/` | Microsoft Defender for Identity |
    | `/mcas/` | Microsoft Cloud App Security (Defender for Cloud Apps) |
    | `/mdc/` | Microsoft Defender for Cloud |
    | `/mtoapi/` | Multi-Tenant Operations |
    | `/securityplatform/` | Security Platform (Data Lake) |
    | `/radius/` | RADIUS Identity Services |

    Documentation and specifications have been provided on a best efforts basis and may not be 100% accurate.

  version: '1.0'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://security.microsoft.com/apiproxy

security:
  - PortalSession: []

components:
  securitySchemes:
    PortalSession:
      type: apiKey
      in: cookie
      name: sccauth
      description: >-
        Session-based authentication via the Microsoft Defender XDR portal.
        Requires an authenticated browser session at security.microsoft.com.

tags:
  - name: Alerts
    description: Operations relating to alert management and retrieval.
  - name: Incidents
    description: Operations relating to incident management, merging, and alert correlation.
  - name: Advanced Hunting
    description: |
      Operations relating to Advanced Hunting, including schema discovery, saved functions,
      custom detection rules, and query encoding.
  - name: Endpoint Devices
    description: |
      Operations relating to endpoint device management in Microsoft Defender for Endpoint (MDE),
      including device inventory, tags, asset values, RBAC groups, and device actions.
  - name: Live Response
    description: |
      Operations relating to Live Response sessions on endpoint devices,
      including session management, command execution, file operations, and the script library.
  - name: Endpoint Configuration
    description: |
      Operations relating to endpoint configuration settings, including advanced features,
      preview features, custom collection rules, and workload-specific configurations.
  - name: Vulnerability Management
    description: |
      Operations relating to Threat and Vulnerability Management (TVM), including vulnerability
      listings, remediation tasks, product inventory, security advisories, and baselines.
  - name: Identity
    description: |
      Operations relating to Microsoft Defender for Identity (MDI), including user resolution,
      identity entities, service accounts, domain controller coverage, and configuration.
  - name: Configuration
    description: |
      Operations relating to Defender XDR platform configuration, including suppression rules,
      alert tuning, preview features, critical asset management, unified RBAC, and Cloud Apps settings.
  - name: Exposure Management
    description: |
      Operations relating to Exposure Management and Cross-Workload Security Posture Management (XSPM),
      including attack paths, choke points, entry points, targets, and recommendations.
  - name: Data Lake
    description: Operations relating to the security data lake, including database and table schema discovery.
  - name: Threat Analytics
    description: Operations relating to Threat Analytics reports and outbreak tracking.
  - name: Action Center
    description: Operations relating to the Action Center, including history and pending actions.
  - name: Multi-Tenant
    description: |
      Operations relating to multi-tenant management, including tenant listing,
      workload status, and cross-tenant advanced hunting.
  - name: Streaming API
    description: Operations relating to the Streaming API configuration for event export.
  - name: Secure Score
    description: Operations relating to Microsoft Secure Score, including score retrieval, control profiles, security initiatives, and insights.
  - name: Portal Services
    description: |
      Operations relating to miscellaneous Defender XDR portal services, including user preferences,
      shell info, Security Copilot, compliance checks, attack simulation, and app governance.

