components:
  schemas:
    TableSchema:
      type: object
      description: Schema definition for an advanced hunting table.
      properties:
        name:
          description: The table name.
          type: string
          example: DeviceEvents
        columns:
          description: The columns in the table.
          type: array
          items:
            type: object
            properties:
              name:
                description: The column name.
                type: string
              type:
                description: The data type of the column.
                type: string
              description:
                description: A description of the column.
                type: string
    SavedFunction:
      type: object
      description: A saved advanced hunting function.
      properties:
        id:
          description: The unique identifier of the function.
          type: string
        displayName:
          description: The display name of the function.
          type: string
        body:
          description: The KQL function body.
          type: string
        description:
          description: A description of the function.
          type: string
        inputParameters:
          description: Input parameters for the function.
          type: string
        createdBy:
          description: The user who created the function.
          type: string
        lastModifiedDateTime:
          description: When the function was last modified.
          type: string
          format: date-time
    SavedFunctionCreate:
      type: object
      description: Request body for creating a saved function.
      properties:
        displayName:
          description: The display name of the function.
          type: string
        body:
          description: The KQL function body.
          type: string
        description:
          description: A description of the function.
          type: string
        inputParameters:
          description: Input parameters for the function.
          type: string
      required:
        - displayName
        - body
    SavedFunctionUpdate:
      type: object
      description: Request body for updating a saved function.
      properties:
        id:
          description: The unique identifier of the function to update.
          type: string
        displayName:
          description: The display name of the function.
          type: string
        body:
          description: The KQL function body.
          type: string
        description:
          description: A description of the function.
          type: string
        inputParameters:
          description: Input parameters for the function.
          type: string
      required:
        - id
        - displayName
        - body
    DetectionRule:
      type: object
      description: A custom detection rule.
      properties:
        id:
          description: The unique identifier of the rule.
          type: string
        ruleName:
          description: The name of the detection rule.
          type: string
        severity:
          description: The severity of alerts generated by this rule.
          type: string
          enum: [Informational, Low, Medium, High]
        isEnabled:
          description: Whether the rule is enabled.
          type: boolean
        query:
          description: The KQL query for the detection.
          type: string
        frequency:
          description: How often the rule runs.
          type: string
        lastRunTime:
          description: The last time the rule was executed.
          type: string
          format: date-time
        createdBy:
          description: The user who created the rule.
          type: string
