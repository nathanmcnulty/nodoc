paths:
  /mtp/huntingService/schema:
    get:
      summary: Get advanced hunting table schema
      description: >-
        Retrieve the schema for all advanced hunting tables, including column names,
        types, and descriptions. Used to power the schema browser in the hunting interface.
      operationId: AdvancedHunting.GetTableSchema
      tags: [Advanced Hunting]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TableSchema'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/huntingService/savedFunctions:
    get:
      summary: List saved functions
      description: >-
        Retrieve a list of all saved advanced hunting functions (custom functions)
        available to the user.
      operationId: AdvancedHunting.ListFunctions
      tags: [Advanced Hunting]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SavedFunction'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/huntingService/functions/defender/savedfunctions/{Id}:
    get:
      summary: Get saved function
      description: >-
        Retrieve a specific saved advanced hunting function by its unique identifier.
      operationId: AdvancedHunting.GetFunction
      tags: [Advanced Hunting]
      parameters:
        - name: Id
          in: path
          required: true
          description: The unique identifier of the saved function.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedFunction'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/huntingService/rules/unified:
    get:
      summary: List unified custom detection rules
      description: >-
        Retrieve a list of all unified custom detection rules configured in the tenant.
        Supports pagination and sorting.
      operationId: AdvancedHunting.ListUnifiedDetectionRules
      tags: [Advanced Hunting]
      parameters:
        - name: pageIndex
          in: query
          description: Current page number (1-based).
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: Number of results per page.
          schema:
            type: integer
            default: 10000
        - name: sortOrder
          in: query
          description: Sort direction for results.
          schema:
            type: string
            enum: [Ascending, Descending]
        - name: isUnifiedRulesListEnabled
          in: query
          description: Whether to return the unified rules list.
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: common.yml#/components/schemas/PaginatedListResponse
                  - type: object
                    properties:
                      rules:
                        type: array
                        items:
                          $ref: '#/components/schemas/DetectionRule'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/huntingService/reports/userHistory:
    get:
      summary: Get user hunting query history
      description: >-
        Retrieve the advanced hunting query execution history for the current user.
      operationId: AdvancedHunting.GetUserHistory
      tags: [Advanced Hunting]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    query:
                      description: The KQL query text.
                      type: string
                    timestamp:
                      description: When the query was executed.
                      type: string
                      format: date-time
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
    post:
      summary: Get user hunting history report
      description: >-
        Retrieve the user hunting history report with detailed execution data.
      operationId: AdvancedHunting.GetUserHistoryReport
      tags: [Advanced Hunting]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: pending - user history report request
      responses:
        '200':
          description: OK
          content:
            application/json:
