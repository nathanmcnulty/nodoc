paths:
  /mtp/settings/GetAdvancedFeaturesSetting:
    get:
      summary: Get advanced features setting
      description: >-
        Retrieve the current advanced features settings for Microsoft Defender
        for Endpoint via GET request.
      operationId: EndpointConfiguration.GetAdvancedFeaturesGet
      tags: [Endpoint Configuration]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvancedFeaturesSettings'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
    post:
      summary: Get advanced features settings
      description: >-
        Retrieve the current advanced features settings for Microsoft Defender
        for Endpoint. This includes toggles for features like automated investigation,
        live response, custom network indicators, and more.
      operationId: EndpointConfiguration.GetAdvancedFeatures
      tags: [Endpoint Configuration]
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvancedFeaturesSettings'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/settings/SaveAdvancedFeaturesSetting:
    post:
      summary: Set advanced features settings
      description: >-
        Update the advanced features settings for Microsoft Defender for Endpoint.
        Warning - this modifies tenant-wide security configuration.
      operationId: EndpointConfiguration.SetAdvancedFeatures
      tags: [Endpoint Configuration]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvancedFeaturesSettings'
      responses:
        '200':
          description: OK
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/settings/GetPreviewExperienceSetting:
    get:
      summary: Get preview features setting
      description: >-
        Retrieve the preview features opt-in status. Supports multiple contexts
        including Microsoft Threat Protection (MtpContext) and Microsoft Defender
        for Endpoint (MdatpContext).
      operationId: EndpointConfiguration.GetPreviewFeatures
      tags: [Endpoint Configuration]
      parameters:
        - name: context
          in: query
          required: true
          description: The context to retrieve preview settings for.
          schema:
            type: string
            enum: [MtpContext, MdatpContext]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  isOptedIn:
                    description: Whether preview features are enabled.
                    type: boolean
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/customDataCollection/rules:
    get:
      summary: List custom data collection rules
      description: >-
        Retrieve a list of all custom data collection rules configured for endpoints.
      operationId: EndpointConfiguration.ListCustomCollectionRules
      tags: [Endpoint Configuration]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomCollectionRule'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
    post:
      summary: Create custom data collection rule
      description: >-
        Create a new custom data collection rule for endpoint telemetry.
      operationId: EndpointConfiguration.CreateCustomCollectionRule
      tags: [Endpoint Configuration]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomCollectionRule'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomCollectionRule'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/customDataCollection/rules/{RuleId}:
    put:
      summary: Update custom data collection rule
      description: >-
        Update an existing custom data collection rule.
      operationId: EndpointConfiguration.UpdateCustomCollectionRule
      tags: [Endpoint Configuration]
      parameters:
        - name: RuleId
          in: path
          required: true
          description: The unique identifier of the rule to update.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomCollectionRule'
      responses:
        '200':
          description: OK
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/deviceManagement/configuration/AuthenticatedTelemetry:
    get:
      summary: Get authenticated telemetry configuration
      description: >-
        Retrieve the authenticated telemetry configuration setting for endpoints.
      operationId: EndpointConfiguration.GetAuthenticatedTelemetry
      tags: [Endpoint Configuration]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  isEnabled:
                    description: Whether authenticated telemetry is enabled.
                    type: boolean
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/deviceManagement/configuration/PotentiallyUnwantedApplications:
    get:
      summary: Get PUA configuration
      description: >-
        Retrieve the Potentially Unwanted Applications (PUA) protection
        configuration for endpoints.
      operationId: EndpointConfiguration.GetPuaConfiguration
      tags: [Endpoint Configuration]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  isEnabled:
                    description: Whether PUA protection is enabled.
                    type: boolean
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/deviceManagement/configuration/IntuneConnection:
    get:
      summary: Get Intune connection configuration
      description: >-
        Retrieve the Microsoft Intune connection configuration for Defender for Endpoint.
      operationId: EndpointConfiguration.GetIntuneConnection
      tags: [Endpoint Configuration]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  isEnabled:
                    description: Whether the Intune connection is enabled.
                    type: boolean
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/deviceManagement/configuration/PurviewSharing:
    get:
      summary: Get Purview sharing configuration
      description: >-
        Retrieve the Microsoft Purview data sharing configuration for Defender for Endpoint.
      operationId: EndpointConfiguration.GetPurviewSharing
      tags: [Endpoint Configuration]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  isEnabled:
                    description: Whether Purview sharing is enabled.
                    type: boolean
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/unifiedExperience/mde/configurationManagement/mem/securityPolicies:
    post:
      summary: List endpoint security policies
      description: >-
        Retrieve the Microsoft Intune endpoint security policies shown on the Defender
        policy inventory experience for the selected platform.
      operationId: EndpointConfiguration.ListSecurityPolicies
      tags: [Endpoint Configuration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                platform:
                  description: The platform family to list policies for.
                  type: string
                  example: Windows
              required:
                - platform
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - endpoint security policy inventory response
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/unifiedExperience/mde/configurationManagement/mem/securityPolicies/filters:
    get:
      summary: Get endpoint security policy filters
      description: >-
        Retrieve the filter values used by the Defender policy inventory page
        for Microsoft Intune endpoint security policies.
      operationId: EndpointConfiguration.GetSecurityPolicyFilters
      tags: [Endpoint Configuration]
      parameters:
        - name: platform
          in: query
          required: true
          description: The platform family to enumerate filters for.
          schema:
            type: string
            example: Windows
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - endpoint security policy filters
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/unifiedExperience/mde/configurationManagement/mem/device/{MachineId}/policies:
    get:
      summary: List device policy assignments
      description: >-
        Retrieve the endpoint security policies assigned to a specific device from the
        policy inventory device pane.
      operationId: EndpointConfiguration.ListDevicePolicies
      tags: [Endpoint Configuration]
      parameters:
        - name: MachineId
          in: path
          required: true
          description: The Defender machine identifier for the device.
          schema:
            type: string
        - name: aadDeviceId
          in: query
          description: The Microsoft Entra device identifier when the device is Intune-managed.
          schema:
            type: string
        - name: isManagedByMde
          in: query
          required: true
          description: Whether the device is managed directly by Defender for Endpoint.
          schema:
            type: boolean
        - name: page
          in: query
          description: Page number for paginated policy results.
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: Number of policy assignments to return.
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - device policy assignment response
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/unifiedExperience/mde/configurationManagement/mem/proxy/deviceManagement/managedDevices:
    get:
      summary: Resolve Intune managed device
      description: >-
        Look up the backing Microsoft Intune managed-device record that corresponds
        to the selected Defender device.
      operationId: EndpointConfiguration.ListManagedDevices
      tags: [Endpoint Configuration]
      parameters:
        - name: $filter
          in: query
          required: true
          description: OData filter used to resolve the managed device by Entra device ID.
          schema:
            type: string
        - name: $top
          in: query
          description: Maximum number of managed devices to return.
          schema:
            type: integer
            default: 1
        - name: $select
          in: query
          description: Projection of the managed-device fields required by the portal.
          schema:
            type: string
            default: id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - managed-device lookup response
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/unifiedExperience/mde/configurationManagement/mem/proxy/deviceManagement/managedDevices/{ManagedDeviceId}/users:
    get:
      summary: List managed device users
      description: >-
        Retrieve the primary users projected from the linked Microsoft Intune managed device.
      operationId: EndpointConfiguration.ListManagedDeviceUsers
      tags: [Endpoint Configuration]
      parameters:
        - name: ManagedDeviceId
          in: path
          required: true
          description: The Microsoft Intune managed-device identifier.
          schema:
            type: string
        - name: $select
          in: query
          description: Projection of the user fields required by the portal.
          schema:
            type: string
            default: id,displayName,userPrincipalName
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: pending - managed device user
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

components:
  schemas:
    AdvancedFeaturesSettings:
      type: object
      description: >-
        Advanced features settings for Microsoft Defender for Endpoint.
        Each property represents a feature toggle.
      properties:
        automatedInvestigation:
          description: Whether automated investigation is enabled.
          type: boolean
        liveResponse:
          description: Whether Live Response is enabled.
          type: boolean
        liveResponseUnsignedScriptExecution:
          description: Whether unsigned script execution in Live Response is enabled.
          type: boolean
        liveResponseForServers:
          description: Whether Live Response for servers is enabled.
          type: boolean
        customNetworkIndicators:
          description: Whether custom network indicators are enabled.
          type: boolean
        tamperProtection:
          description: Whether tamper protection is enabled.
          type: boolean
        showUserDetails:
          description: Whether to show user details in alerts.
          type: boolean
        skypeForBusinessIntegration:
          description: Whether Skype for Business integration is enabled.
          type: boolean
        officeIntegration:
          description: Whether Office 365 integration is enabled.
          type: boolean
        microsoftThreatExperts:
          description: Whether Microsoft Threat Experts is enabled.
          type: boolean
        webContentFiltering:
          description: Whether web content filtering is enabled.
          type: boolean
        deviceDiscovery:
          description: Whether device discovery is enabled.
          type: boolean
        previewExperience:
          description: Whether preview experience is enabled.
          type: boolean
        microsoftIntunConnection:
          description: Whether Microsoft Intune connection is enabled.
          type: boolean
        endpointDlpEnabled:
          description: Whether endpoint DLP is enabled.
          type: boolean
        authenticatedTelemetry:
          description: Whether authenticated telemetry is enabled.
          type: boolean
    CustomCollectionRule:
      type: object
      description: A custom data collection rule for endpoint telemetry.
      properties:
        id:
          description: The unique identifier of the rule.
          type: string
        name:
          description: The name of the rule.
          type: string
        description:
          description: A description of the rule.
          type: string
        isEnabled:
          description: Whether the rule is enabled.
          type: boolean
        query:
          description: The data collection query.
          type: string
        frequency:
          description: How often data is collected.
          type: string
