paths:
  /mtp/actionCenter/actioncenterui/history-actions:
    get:
      summary: Get action center history
      description: >-
        Retrieve the history of completed actions from the Defender XDR Action Center.
        Includes automated investigation actions, manual response actions, and
        remediation activities.
      operationId: ActionCenter.GetHistory
      tags: [Action Center]
      parameters:
        - name: $skip
          in: query
          description: Number of records to skip.
          schema:
            type: integer
        - name: $top
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
        - name: pageSize
          in: query
          description: The number of results per page.
          schema:
            type: integer
            default: 50
        - name: pageIndex
          in: query
          description: The page index for pagination.
          schema:
            type: integer
            default: 0
        - name: sortByField
          in: query
          description: Field to sort results by.
          schema:
            type: string
        - name: sortOrder
          in: query
          description: Sort order.
          schema:
            type: string
            enum: [Ascending, Descending]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: common.yml#/components/schemas/PaginatedListResponse
                  - type: object
                    properties:
                      actions:
                        type: array
                        items:
                          $ref: '#/components/schemas/ActionCenterItem'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/actionCenter/actioncenterui/pending-actions:
    get:
      summary: Get pending actions
      description: >-
        Retrieve the list of pending actions from the Defender XDR Action Center
        that are awaiting approval or execution.
      operationId: ActionCenter.GetPending
      tags: [Action Center]
      parameters:
        - name: $skip
          in: query
          description: Number of records to skip.
          schema:
            type: integer
        - name: $top
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
        - name: pageSize
          in: query
          description: The number of results per page.
          schema:
            type: integer
            default: 50
        - name: pageIndex
          in: query
          description: The page index for pagination.
          schema:
            type: integer
            default: 0
        - name: sortByField
          in: query
          description: Field to sort results by.
          schema:
            type: string
        - name: sortOrder
          in: query
          description: Sort order.
          schema:
            type: string
            enum: [Ascending, Descending]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: common.yml#/components/schemas/PaginatedListResponse
                  - type: object
                    properties:
                      actions:
                        type: array
                        items:
                          $ref: '#/components/schemas/ActionCenterItem'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/actionCenter/actioncenterui/pending-actions/filters:
    get:
      summary: Get pending actions filters
      description: >-
        Retrieve the available filter options for pending actions in the Action Center.
      operationId: ActionCenter.GetPendingFilters
      tags: [Action Center]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - pending actions filter options
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/actionCenter/actioncenterui/history-actions/filters:
    get:
      summary: Get history actions filters
      description: >-
        Retrieve the available filter options for history actions in the Action Center.
      operationId: ActionCenter.GetHistoryFilters
      tags: [Action Center]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - history actions filter options
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/actionCenter/actioncenterui/tile:
    get:
      summary: Get action center tile summary
      description: >-
        Retrieve the Action Center tile summary data, including counts of
        pending and completed actions.
      operationId: ActionCenter.GetTileSummary
      tags: [Action Center]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - action center tile summary
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/actionCenter/actioncenterui/pending-actions/pending-actions-summary:
    get:
      summary: Get pending actions summary
      description: >-
        Retrieve a summary of pending actions in the Action Center,
        including counts by action type and status.
      operationId: ActionCenter.GetPendingSummary
      tags: [Action Center]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - pending actions summary data
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/actionCenter/actioncenterui/history-actions/export:
    get:
      summary: Export action center history
      description: >-
        Export the filtered Action Center history grid as CSV from the Defender portal.
      operationId: ActionCenter.ExportHistory
      tags: [Action Center]
      parameters:
        - name: sortByField
          in: query
          description: Field to sort the export by.
          schema:
            type: string
        - name: sortOrder
          in: query
          description: Sort direction for the export.
          schema:
            type: string
            enum: [Ascending, Descending]
        - name: type
          in: query
          description: The Action Center dataset to export.
          schema:
            type: string
            default: history
        - name: pageIndex
          in: query
          description: The current page index used to scope the export request.
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: The current page size used to scope the export request.
          schema:
            type: integer
            default: 9
        - name: toDate
          in: query
          description: End of the exported date range.
          schema:
            type: string
            format: date-time
        - name: fromDate
          in: query
          description: Start of the exported date range.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: CSV export
          content:
            text/csv:
              schema:
                type: string
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/automation/internal/automation/{TenantId}/automationRules:
    get:
      summary: List automation rules
      description: >-
        Retrieve the automation rules displayed on the Defender XDR automation page for
        the current tenant.
      operationId: ActionCenter.ListAutomationRules
      tags: [Action Center]
      parameters:
        - name: TenantId
          in: path
          required: true
          description: The Microsoft Entra tenant identifier.
          schema:
            type: string
            format: uuid
        - name: pageSize
          in: query
          description: The number of automation rules to request.
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: pending - automation rule definition
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/CaseManagement/be/attachments:
    get:
      summary: List case attachments
      description: >-
        Retrieve the case attachment metadata loaded by the Defender case management experience.
      operationId: ActionCenter.ListCaseAttachments
      tags: [Action Center]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - case attachments response
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/CaseManagement/be/cases/{CaseId}:
    get:
      summary: Get case details
      description: >-
        Retrieve the full case record shown by the Defender case management detail view.
      operationId: ActionCenter.GetCase
      tags: [Action Center]
      parameters:
        - name: CaseId
          in: path
          required: true
          description: The Defender case identifier.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - case details
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/CaseManagement/be/cases/{CaseId}/activities:
    get:
      summary: List case activities
      description: >-
        Retrieve the activity timeline for a Defender case detail view.
      operationId: ActionCenter.ListCaseActivities
      tags: [Action Center]
      parameters:
        - name: CaseId
          in: path
          required: true
          description: The Defender case identifier.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - case activities response
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

components:
  schemas:
    ActionCenterItem:
      type: object
      description: An item in the Action Center.
      properties:
        actionId:
          description: The unique identifier of the action.
          type: string
        actionType:
          description: The type of action.
          type: string
        status:
          description: The current status.
          type: string
          enum: [Pending, Running, Completed, Failed, Cancelled]
        entityType:
          description: The type of entity the action targets.
          type: string
        entityName:
          description: The name of the target entity.
          type: string
        investigationId:
          description: The associated investigation ID, if applicable.
          type: string
        createdBy:
          description: Who initiated the action.
          type: string
        createdDateTime:
          description: When the action was created.
          type: string
          format: date-time
        completedDateTime:
          description: When the action completed.
          type: string
          format: date-time
          nullable: true
