paths:
  /mtp/userPreferences/api/mgmt/userpreferencesservice/userPreference:
    get:
      summary: Get user preferences
      description: >-
        Retrieve the current user's preferences for the Defender XDR portal.
      operationId: PortalServices.GetUserPreferences
      tags: [Portal Services]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/UserPreferenceBlobResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
    patch:
      summary: Update user preference
      description: >-
        Update a specific user preference setting in the Defender XDR portal.
      operationId: PortalServices.UpdateUserPreference
      tags: [Portal Services]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: pending - user preference update data
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - updated user preference
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/userPreferences/api/mgmt/userpreferencesservice/userPreference/alwaysUseUtc:
    get:
      summary: Get UTC preference
      description: >-
        Retrieve the user's preference for always displaying times in UTC.
      operationId: PortalServices.GetUtcPreference
      tags: [Portal Services]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - UTC preference setting
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/mdepDnH/reports/machineHealth/healthStatus:
    get:
      summary: Get machine health status report
      description: >-
        Retrieve the machine health status report including device health
        distribution and trends.
      operationId: PortalServices.GetMachineHealthStatus
      tags: [Portal Services]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - machine health status report data
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /shell/api/shell/shellinfo:
    get:
      summary: Get shell info
      description: >-
        Retrieve shell information for the Defender XDR portal session.
      operationId: PortalServices.GetShellInfo
      tags: [Portal Services]
      x-nodoc-operation-context:
        surface: Portal shell
        workflows:
          - Load or refresh the Defender XDR shell before feature blades and cross-solution entry points fully hydrate.
        authProfile: defender-session-baseline
        availability:
          level: user-context
          notes:
            - Returned shell state reflects the signed-in operator, current tenant, and enabled Defender surfaces.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/ShellInfoResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /medeina/auth:
    get:
      summary: Get Medeina (Copilot) auth
      description: >-
        Retrieve authentication status for the Medeina (Security Copilot) service.
      operationId: PortalServices.GetMedeinaAuth
      tags: [Portal Services]
      x-nodoc-operation-context:
        surface: Security Copilot entrypoint
        workflows:
          - Open Security Copilot entry points or related Defender experiences that check Copilot readiness.
        authProfile: defender-copilot-entitlement
        availability:
          level: tenant-conditional
          notes:
            - Returned auth and readiness state depends on tenant enablement and the signed-in operator.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - Medeina authentication data
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cdssecuritycopilot/trial:
    get:
      summary: Get Security Copilot trial status
      description: >-
        Retrieve the Security Copilot trial status for the tenant.
      operationId: PortalServices.GetSecurityCopilotTrial
      tags: [Portal Services]
      x-nodoc-operation-context:
        surface: Security Copilot entrypoint
        workflows:
          - Load trial, onboarding, or entitlement UX for Security Copilot from the Defender portal.
        authProfile: defender-copilot-entitlement
        availability:
          level: tenant-conditional
          notes:
            - Trial state is specific to the current tenant and may be absent where Security Copilot onboarding is disabled.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - Security Copilot trial status
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /msgraph/v1.0/users:
    get:
      summary: List users via Graph proxy
      description: >-
        Retrieve a list of users via the Microsoft Graph API proxy endpoint
        in the Defender XDR portal.
      operationId: PortalServices.ListUsersGraph
      tags: [Portal Services]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/GraphUsersResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /msgraph/v1.0/users/{UserId}:
    get:
      summary: Get user via Graph proxy
      description: >-
        Retrieve a specific user via the Microsoft Graph proxy endpoint in the
        Defender portal. Confirmed in live traffic from the MTO Cases page using
        a UPN-style identifier and an explicit `$select` projection.
      operationId: PortalServices.GetUserGraph
      tags: [Portal Services]
      parameters:
        - name: UserId
          in: path
          required: true
          description: User identifier passed to Graph, such as a UPN or object ID.
          schema:
            type: string
        - name: $select
          in: query
          description: Comma-separated Graph fields to project in the response.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/GraphUser
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /di/Find/TrialOffer:
    get:
      summary: Find trial offers
      description: >-
        Find available trial offers for Defender services.
      operationId: PortalServices.FindTrialOffer
      tags: [Portal Services]
      responses:
        '200':
