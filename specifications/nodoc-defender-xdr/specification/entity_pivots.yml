paths:
  /mtp/cloudPivot/cloud/pivot/portal/domain/device/details:
    get:
      summary: List devices for domain
      description: >-
        Return the device details grid shown on domain investigation pages.
      operationId: EntityPivots.ListDomainDevices
      tags: [Entity Pivots]
      parameters:
        - $ref: '#/components/parameters/EntityId'
        - $ref: '#/components/parameters/DaysToLookBack7'
        - $ref: '#/components/parameters/FirstRowIndex'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/RiskScores'
        - $ref: '#/components/parameters/ExposureScores'
        - $ref: '#/components/parameters/OsPlatformFriendlyNames'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityPivotListResponse'
        '401':
          $ref: common.yml#/components/responses/Unauthorized
        '403':
          $ref: common.yml#/components/responses/Forbidden
        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/cloudPivot/cloud/pivot/portal/domain/device/prevalence:
    get:
      summary: Get domain device prevalence
      description: >-
        Return the first and last observed device summary for the selected
        domain.
      operationId: EntityPivots.GetDomainDevicePrevalence
      tags: [Entity Pivots]
      parameters:
        - $ref: '#/components/parameters/EntityId'
        - $ref: '#/components/parameters/DaysToLookBack30'
      responses:
        '200':
          description: OK
          content:
            application/json:
