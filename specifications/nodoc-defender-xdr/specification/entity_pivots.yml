  /mtp/useServiceBaseUrl/ine/entitypagesservice/urls/overview:
    get:
      summary: Get URL overview card
      description: >-
        Retrieve the overview payload used by the unified URL entity page before
        loading the richer pivot charts and prevalence details.
      operationId: EntityPivots.GetUrlOverview
      tags: [Entity Pivots]
      parameters:
        - name: url
          in: query
          required: true
          description: The URL or domain value to investigate.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - URL overview card data
        '401':
          $ref: common.yml#/components/responses/Unauthorized
        '403':
          $ref: common.yml#/components/responses/Forbidden
        '404':
          $ref: common.yml#/components/responses/NotFound

components:
  parameters:
    EntityId:
      name: entityId
      in: query
      required: true
      description: The investigated domain or URL value.
      schema:
        type: string
    DaysToLookBack7:
      name: daysToLookBack
      in: query
      description: The lookback window, in days.
      schema:
        type: integer
        default: 7
    DaysToLookBack30:
      name: daysToLookBack
      in: query
      description: The lookback window, in days.
      schema:
        type: integer
        default: 30
    FirstRowIndex:
      name: firstRowIndex
      in: query
      description: The 1-based row index used by the portal grid.
      schema:
        type: integer
        default: 1
    PageSize:
      name: pageSize
      in: query
      description: The maximum number of rows to return.
      schema:
        type: integer
        default: 50
    RiskScores:
      name: RiskScores
      in: query
      description: Optional risk-score filter values.
      schema:
        type: string
    ExposureScores:
      name: ExposureScores
      in: query
      description: Optional exposure-score filter values.
      schema:
        type: string
    OsPlatformFriendlyNames:
      name: OsPlatformFriendlyNames
      in: query
      description: Optional OS-platform filter values.
      schema:
        type: string
    DeliveryAction:
      name: deliveryAction
      in: query
      description: Optional mail delivery action filter.
      schema:
        type: string
    OriginalDeliveryLocation:
      name: originalDeliveryLocation
      in: query
      description: Optional original mail delivery location filter.
      schema:
        type: string
    LatestDeliveryLocation:
      name: latestDeliveryLocation
      in: query
      description: Optional latest mail delivery location filter.
      schema:
        type: string
    ActionType:
      name: ActionType
      in: query
      description: Optional click action-type filter.
      schema:
        type: string
    ThreatTypes:
      name: ThreatTypes
      in: query
      description: Optional threat-type filter.
      schema:
        type: string
    DetectionMethods:
      name: DetectionMethods
      in: query
      description: Optional detection-method filter.
      schema:
        type: string
  schemas:
    EntityPivotListResponse:
      type: object
      description: pending - paged entity pivot details
    EntityPivotPrevalenceResponse:
      type: object
      description: pending - first and last seen prevalence summary
    EntityPivotTrendResponse:
      type: object
      description: pending - time-series trend data
