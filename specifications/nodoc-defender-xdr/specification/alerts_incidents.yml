    post:
      summary: Query incidents with alert context
      description: >-
        Retrieve a paged incident list using the incidents experience filter envelope.
        Observed live on the Incidents page, which posts sorting, paging, lookback,
        and risk-filter settings and receives incident summary records with alert
        counts and impacted-entity details.
      operationId: Incidents.QueryIncidentAlerts
      tags: [Incidents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >-
                Incident-query envelope including paging, sorting, lookback, and
                filter settings.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: pending - incident summary with associated alert metadata
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/incidentQueue/incidents/update:
    post:
      summary: Move alert to incident
      description: >-
        Move one or more alerts to a different incident. This operation updates
        the incident association for the specified alerts.
      operationId: Incidents.MoveAlert
      tags: [Incidents]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                incidentId:
                  description: The target incident ID to move alerts to.
                  type: string
                alertIds:
                  description: List of alert IDs to move.
                  type: array
                  items:
                    type: string
              required:
                - incidentId
                - alertIds
      responses:
        '200':
          description: OK
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/incidentQueue/incidents/merge:
    post:
      summary: Merge incidents
      description: >-
        Merge multiple incidents into a single incident. All alerts from the
        source incidents are moved to the target incident.
      operationId: Incidents.Merge
      tags: [Incidents]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                targetIncidentId:
                  description: The incident ID that will remain after the merge.
                  type: string
                sourceIncidentIds:
                  description: List of incident IDs to merge into the target.
                  type: array
                  items:
                    type: string
              required:
                - targetIncidentId
                - sourceIncidentIds
      responses:
        '200':
          description: OK
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

