  /mtp/GAIAMedeinaApi/skills/guidedresponse/{IncidentId}/similarIncidents:
    get:
      summary: Get guided-response similar incidents
      description: >-
        Retrieve incidents considered similar by the GAIA guided-response skill
        for the supplied incident.
      operationId: Incidents.GetGuidedResponseSimilarIncidents
      tags: [Incidents]
      parameters:
        - name: IncidentId
          in: path
          required: true
          description: The unique identifier of the incident.
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - similar incident recommendations
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

components:
  schemas:
    Alert:
      type: object
      description: A Defender XDR alert.
      properties:
        alertId:
          description: The unique identifier of the alert.
          type: string
        incidentId:
          description: The incident ID the alert is associated with.
          type: string
        title:
          description: The title of the alert.
          type: string
        severity:
          description: The severity level of the alert.
          type: string
          enum: [Informational, Low, Medium, High]
        status:
          description: The current status of the alert.
          type: string
          enum: [New, InProgress, Resolved]
        category:
          description: The alert category.
          type: string
        serviceSource:
          description: The service that generated the alert.
          type: string
        detectionSource:
          description: The detection source.
          type: string
        alertCreationTime:
          description: The time the alert was created.
          type: string
          format: date-time
        lastUpdatedTime:
          description: The time the alert was last updated.
          type: string
          format: date-time
    Incident:
      type: object
      description: A Defender XDR incident.
      properties:
        incidentId:
          description: The unique identifier of the incident.
          type: string
        incidentName:
          description: The name of the incident.
          type: string
        severity:
          description: The severity level of the incident.
          type: string
          enum: [Informational, Low, Medium, High]
        status:
          description: The current status of the incident.
          type: string
        assignedTo:
          description: The user assigned to the incident.
          type: string
        classification:
          description: The classification of the incident.
          type: string
        determination:
          description: The determination of the incident.
          type: string
        alertCount:
          description: The number of alerts in the incident.
          type: integer
        createdTime:
          description: The time the incident was created.
          type: string
          format: date-time
        lastUpdatedTime:
          description: The time the incident was last updated.
          type: string
          format: date-time
