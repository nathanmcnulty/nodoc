        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/incidents/{IncidentId}/AggregatedCustomDetails:
    get:
      summary: Get aggregated incident custom details
      description: >-
        Retrieve the custom detail rollup shown on the incident overview page.
      operationId: Incidents.GetAggregatedCustomDetails
      tags: [Incidents]
      parameters:
        - name: IncidentId
          in: path
          required: true
          description: The unique identifier of the incident.
          schema:
            type: integer
        - name: maxAlerts
          in: query
          description: Maximum number of alerts to aggregate in the detail rollup.
          schema:
            type: integer
            default: 150
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - aggregated incident custom details
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/incidents/{IncidentId}/AssociatedAlerts:
    post:
      summary: List incident associated alerts
      description: >-
        Retrieve the associated alerts table shown on incident detail pages.
      operationId: Incidents.ListAssociatedAlerts
      tags: [Incidents]
      parameters:
        - name: IncidentId
          in: path
          required: true
          description: The unique identifier of the incident.
          schema:
            type: integer
        - name: incidentId
          in: query
          description: Redundant incident identifier currently sent by the portal.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: The incident alert-grid request payload.
              properties:
                LookBackInDays:
                  type: integer
                  description: The lookback window for associated alerts.
                PageSize:
                  type: integer
                  description: Number of alerts to return per page.
                PageIndex:
                  type: integer
                  description: The 1-based page index.
                SortByField:
                  type: string
                  description: The field used to sort alert rows.
                SortOrder:
                  type: integer
                  description: Sort direction enum used by the portal client.
                GroupType:
                  type: string
                  description: Alert grouping mode.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - associated alerts page
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

