      operationId: Incidents.GetMessageBarIndicators
      tags: [Incidents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IncidentId:
                  type: integer
                  description: The incident identifier to evaluate.
                V3EntityTypes:
                  type: array
                  description: Entity types to include in the message bar query.
                  items:
                    type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - message bar indicators
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

