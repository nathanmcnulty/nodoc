                description: pending - alert count result
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/incidentDashboard/Dashboard/ActiveIncidentsSummary:
    get:
      summary: Get active incidents summary
      description: >-
