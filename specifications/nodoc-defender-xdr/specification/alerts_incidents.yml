          in: path
          required: true
          description: The unique identifier of the case template.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - case template definition
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/autoIr/incidents/{IncidentId}:
    get:
      summary: Get AutoIR incident data
      description: >-
        Retrieve the Automated Investigation and Response (AutoIR) summary for
        an incident.
      operationId: Incidents.GetAutoIrIncident
      tags: [Incidents]
      parameters:
        - name: IncidentId
          in: path
          required: true
          description: The unique identifier of the incident.
          schema:
            type: integer
        - name: pageSize
          in: query
          description: The maximum number of AutoIR rows to return.
          schema:
            type: integer
            default: 1
        - name: pageIndex
          in: query
          description: The 1-based page index.
          schema:
            type: integer
            default: 1
        - name: IncidentId
          in: query
          description: Redundant incident identifier currently sent by the portal.
          schema:
            type: integer
        - name: useDotnetAutoIrUi
          in: query
          description: Feature flag for the .NET-backed AutoIR experience.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - AutoIR incident data
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/autoIr/incidents/{IncidentId}/filters:
    get:
      summary: Get AutoIR incident filters
      description: >-
        Retrieve the available filter options for the AutoIR incident view.
      operationId: Incidents.GetAutoIrIncidentFilters
      tags: [Incidents]
      parameters:
        - name: IncidentId
          in: path
          required: true
          description: The unique identifier of the incident.
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - AutoIR filter metadata
        '401':
          $ref: common.yml#/components/responses/Unauthorized

