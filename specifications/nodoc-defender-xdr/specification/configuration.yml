components:
  schemas:
    SuppressionRule:
      type: object
      description: An alert suppression (tuning) rule.
      properties:
        id:
          description: The unique identifier of the rule.
          type: string
        name:
          description: The name of the suppression rule.
          type: string
        isEnabled:
          description: Whether the rule is enabled.
          type: boolean
        conditions:
          description: The conditions for suppressing alerts.
          type: object
        createdBy:
          description: The user who created the rule.
          type: string
        createdDateTime:
          description: When the rule was created.
          type: string
          format: date-time
        expirationDateTime:
          description: When the rule expires.
          type: string
          format: date-time
          nullable: true
    CriticalAssetClassification:
      type: object
      description: A critical asset classification rule.
      properties:
        ruleName:
          description: The name of the classification rule.
          type: string
        description:
          description: A description of the rule.
          type: string
        query:
          description: The classification query.
          type: string
        criticalityLevel:
          description: The criticality level assigned by this rule.
          type: integer
        isBuiltIn:
          description: Whether this is a built-in rule.
          type: boolean
        matchedAssetCount:
          description: Number of assets matching this rule.
          type: integer
    CriticalAssetClassificationCreate:
      type: object
      description: Request body for creating or updating a critical asset classification.
      properties:
        ruleName:
          description: The name of the classification rule.
          type: string
        description:
          description: A description of the rule.
          type: string
        query:
          description: The classification query.
          type: string
        criticalityLevel:
          description: The criticality level to assign.
          type: integer
      required:
        - ruleName
        - query
        - criticalityLevel
    IncidentNotificationSetting:
      type: object
      description: Incident email-notification rule shown in the Defender XDR settings UI.
      properties:
        IncidentNotificationsSettingId:
          type: integer
        Name:
          type: string
        Description:
          type: string
        AlertSeverities:
          type: integer
        AllRbacGroups:
          type: boolean
        RbacGroupIds:
          type: array
          items:
            type: string
        Scopes:
          type: array
          items:
            type: object
            additionalProperties: true
        Rules:
          type: array
          items:
            $ref: '#/components/schemas/IncidentNotificationRule'
        CreatedBy:
          type: string
          format: email
        FormatOptions:
          type: integer
        SendOncePerIncident:
          type: boolean
        CreationTime:
          type: string
          format: date-time
        LastUpdateTime:
          type: string
          format: date-time
        Recipients:
          type: array
          items:
            type: string
            format: email
        IsReadOnly:
          type: boolean
        RulesReadOnly:
          type: boolean
    IncidentNotificationRule:
      type: object
      description: Rule condition within an incident email-notification setting.
      properties:
        RuleOrder:
          type: integer
        AlertSeverities:
          type: integer
        RuleServiceSources:
          type: array
          items:
            $ref: '#/components/schemas/IncidentNotificationServiceSource'
    IncidentNotificationServiceSource:
      type: object
      description: Detection-source selection for an incident notification rule.
