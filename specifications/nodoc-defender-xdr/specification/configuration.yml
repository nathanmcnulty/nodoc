        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                schemaId:
                  type: string
                aggregatedColumns:
                  type: array
                  items:
                    type: object
                    description: pending - requested aggregation
                schemaParameters:
                  type: object
                  additionalProperties: true
                filters:
                  type: array
                  items:
                    type: object
                    description: pending - metrics filter
              required:
                - schemaId
                - aggregatedColumns
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Defender for Cloud inventory aggregation response.
        '401':
