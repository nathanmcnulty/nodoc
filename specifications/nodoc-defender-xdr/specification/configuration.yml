  /mtp/sccManagement/mgmt/TenantContext:
    get:
      summary: Get tenant context
      description: >-
        Retrieve the tenant context information including tenant ID,
        region, and configured workload status. Used for portal initialization.
      operationId: Configuration.GetTenantContext
      tags: [Configuration]
      parameters:
        - name: realTime
          in: query
          description: Whether to fetch real-time data instead of cached.
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Defender tenant bootstrap with environment, geography, workload, and feature-flight state.
              example:
                EnvironmentName: Production
                OrgId: 00000000-0000-0000-0000-000000000000
                GeoRegion: Us3
                DataCenter: EastUs3
                AccountMode: 1
                AccountType: Production
                IsSuspended: false
                IsDeleted: false
                IsMdatpLicenseExpired: false
                IsMtpEligible: true
                HasMachineGroups: true
                IsMdatpActive: true
                IsOatpActive: true
                IsItpActive: true
                IsMapgActive: true
                IsAadIpActive: true
                IsDlpActive: true
                IsIrmActive: true
                IsMdiActive: true
                IsMdcActive: true
                IsSentinelActive: false
                ActiveMtpWorkloads: [1, 2, 3, 4]
                Features:
                  MachineHealth: true
                  CustomerTI: true
                  'Response-Blacklist': true
                  ProcessTree: true
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/xspmatlas/assetrules:
    get:
      summary: List critical asset classifications
      description: >-
        Retrieve all critical asset management classification rules configured
        in the tenant.
      operationId: Configuration.ListCriticalAssetClassifications
      tags: [Configuration]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CriticalAssetClassification'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
    post:
      summary: Create critical asset classification
      description: >-
        Create a new critical asset classification rule.
      operationId: Configuration.CreateCriticalAssetClassification
      tags: [Configuration]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CriticalAssetClassificationCreate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CriticalAssetClassification'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
    put:
      summary: Update critical asset classification
      description: >-
        Update an existing critical asset classification rule.
      operationId: Configuration.UpdateCriticalAssetClassification
      tags: [Configuration]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CriticalAssetClassificationCreate'
      responses:
        '200':
          description: OK
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
    delete:
      summary: Delete critical asset classification
      description: >-
        Delete a critical asset classification rule.
      operationId: Configuration.DeleteCriticalAssetClassification
      tags: [Configuration]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ruleName:
                  description: The name of the rule to delete.
                  type: string
              required:
                - ruleName
      responses:
        '200':
          description: OK
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

