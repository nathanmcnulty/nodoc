            default: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subscriptions:
                  type: array
                  description: Azure subscription identifiers to inspect for eligible workspaces.
                  items:
                    type: string
              required:
                - subscriptions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspaces:
                    type: array
                    items:
                      type: object
                      description: pending - eligible Sentinel workspace
                  skipToken:
                    type: string
                    nullable: true
        '401':
