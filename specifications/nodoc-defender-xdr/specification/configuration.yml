components:
  schemas:
    SuppressionRule:
      type: object
      description: An alert suppression (tuning) rule.
      properties:
        id:
          description: The unique identifier of the rule.
          type: string
        name:
          description: The name of the suppression rule.
          type: string
        isEnabled:
          description: Whether the rule is enabled.
          type: boolean
        conditions:
          description: The conditions for suppressing alerts.
          type: object
        createdBy:
          description: The user who created the rule.
          type: string
        createdDateTime:
          description: When the rule was created.
          type: string
          format: date-time
        expirationDateTime:
          description: When the rule expires.
          type: string
          format: date-time
          nullable: true
    CriticalAssetClassification:
      type: object
      description: A critical asset classification rule.
      properties:
        ruleName:
          description: The name of the classification rule.
          type: string
        description:
          description: A description of the rule.
          type: string
        query:
          description: The classification query.
          type: string
        criticalityLevel:
          description: The criticality level assigned by this rule.
          type: integer
        isBuiltIn:
          description: Whether this is a built-in rule.
          type: boolean
        matchedAssetCount:
          description: Number of assets matching this rule.
          type: integer
    CriticalAssetClassificationCreate:
      type: object
      description: Request body for creating or updating a critical asset classification.
      properties:
        ruleName:
          description: The name of the classification rule.
          type: string
        description:
          description: A description of the rule.
          type: string
        query:
          description: The classification query.
          type: string
        criticalityLevel:
          description: The criticality level to assign.
          type: integer
      required:
        - ruleName
        - query
        - criticalityLevel
