      summary: List critical asset classifications
      description: >-
        Retrieve all critical asset management classification rules configured
        in the tenant.
      operationId: Configuration.ListCriticalAssetClassifications
      tags: [Configuration]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CriticalAssetClassification'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
    post:
      summary: Create critical asset classification
      description: >-
        Create a new critical asset classification rule.
      operationId: Configuration.CreateCriticalAssetClassification
      tags: [Configuration]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CriticalAssetClassificationCreate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CriticalAssetClassification'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
    put:
      summary: Update critical asset classification
      description: >-
        Update an existing critical asset classification rule.
      operationId: Configuration.UpdateCriticalAssetClassification
      tags: [Configuration]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CriticalAssetClassificationCreate'
      responses:
        '200':
          description: OK
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
    delete:
      summary: Delete critical asset classification
      description: >-
        Delete a critical asset classification rule.
      operationId: Configuration.DeleteCriticalAssetClassification
      tags: [Configuration]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ruleName:
                  description: The name of the rule to delete.
                  type: string
              required:
                - ruleName
      responses:
        '200':
          description: OK
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/xspmatlas/assetrules/querybuilder/assets/{encodedRuleName}:
