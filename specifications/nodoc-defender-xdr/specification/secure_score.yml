components:
  schemas:
    TimeSeriesMetricGroup:
      type: object
      description: A group of time-series values with associated dimension labels.
      properties:
        dimensions:
          type: object
          description: Key/value dimension labels for this group (e.g. riskLevel, category, Workload).
          additionalProperties:
            type: string
        values:
          type: array
          items:
            type: number
            format: double
          description: Data point values corresponding to the dates array.
        dates:
          type: array
          items:
            type: string
            format: date-time
          description: ISO 8601 date strings for each data point.
