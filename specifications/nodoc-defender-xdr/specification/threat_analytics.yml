paths:
  /mtp/threatAnalyticsAPI/outbreaks:
    get:
      summary: List threat analytics outbreaks
      description: >-
        Retrieve a paginated list of threat analytics reports and outbreaks.
        Threat analytics provides expert analysis of emerging threats and
        their potential impact on the organization.
      operationId: ThreatAnalytics.ListOutbreaks
      tags: [Threat Analytics]
      parameters:
        - name: pageIndex
          in: query
          description: The page index for pagination.
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          description: The number of results per page.
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: common.yml#/components/schemas/PaginatedListResponse
                  - type: object
                    properties:
                      outbreaks:
                        type: array
                        items:
                          $ref: '#/components/schemas/Outbreak'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/threatAnalytics/outbreaks/changeCount:
    get:
      summary: Get outbreak change count
      description: >-
        Retrieve the count of changes to threat analytics outbreaks since
        the last check, used for notification badges.
      operationId: ThreatAnalytics.GetOutbreakChangeCount
      tags: [Threat Analytics]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - outbreak change count
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/threatAnalytics/outbreaks/outbreaksEnrichedDataMtp:
    get:
      summary: Get enriched outbreak data
      description: >-
        Retrieve enriched threat analytics outbreak data including
        mitigation status and organizational impact metrics.
      operationId: ThreatAnalytics.GetEnrichedOutbreakData
      tags: [Threat Analytics]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - enriched outbreak data
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/threatAnalytics/outbreaks/topthreats:
    get:
      summary: Get top threats
      description: >-
        Retrieve the top threat analytics threats based on organizational
        impact and exposure.
      operationId: ThreatAnalytics.GetTopThreats
      tags: [Threat Analytics]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - top threats data
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/threatAnalyticsIndicators/stix/oneti/reputation:
    get:
      summary: Get indicator reputation
      description: >-
        Retrieve Threat Analytics reputation data for a generic indicator value such as
        an IP address or domain investigated from the unified entity pages.
      operationId: ThreatAnalytics.GetIndicatorReputation
      tags: [Threat Analytics]
      parameters:
        - name: query
          in: query
          required: true
          description: The indicator value to score.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - indicator reputation data
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/threatAnalyticsIndicators/stix/oneti/reputation/URL:
    get:
      summary: Get URL reputation
      description: >-
        Retrieve Threat Analytics reputation data for the selected URL from the unified
        URL investigation experience.
      operationId: ThreatAnalytics.GetUrlReputation
      tags: [Threat Analytics]
      parameters:
        - name: query
          in: query
          required: true
          description: The URL value to score.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - URL reputation data
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

components:
  schemas:
    Outbreak:
      type: object
      description: A threat analytics outbreak report.
      properties:
        id:
          description: The unique identifier of the outbreak.
          type: string
        title:
          description: The title of the outbreak report.
          type: string
        description:
          description: A description of the threat.
          type: string
        severity:
          description: The severity level.
          type: string
          enum: [Informational, Low, Medium, High, Critical]
        publishedDate:
          description: When the report was published.
          type: string
          format: date-time
        lastUpdatedDate:
          description: When the report was last updated.
          type: string
          format: date-time
        impactedDevices:
          description: Number of impacted devices in the organization.
          type: integer
        exposedDevices:
          description: Number of exposed devices.
          type: integer
        mitigatedDevices:
          description: Number of mitigated devices.
          type: integer
        tags:
          description: Tags associated with the outbreak.
          type: array
          items:
            type: string
