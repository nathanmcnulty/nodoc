components:
  schemas:
    IdentityUser:
      type: object
      description: A user identity from Defender for Identity.
      properties:
        accountName:
          description: The user account name.
          type: string
        accountDomain:
          description: The account domain.
          type: string
        displayName:
          description: The display name.
          type: string
        riskScore:
          description: The identity risk score.
          type: string
          enum: [Low, Medium, High]
        isAdmin:
          description: Whether the user has admin privileges.
          type: boolean
        isSensitive:
          description: Whether the user is marked as sensitive.
          type: boolean
        lateralMovementPaths:
          description: Number of lateral movement paths.
          type: integer
    IdentityEntity:
      type: object
      description: An identity entity from Defender for Identity.
      properties:
        id:
          description: The entity identifier.
          type: string
        displayName:
          description: The display name.
          type: string
        entityType:
          description: The type of entity.
          type: string
          enum: [User, Group, Computer, ServiceAccount]
        riskScore:
          description: The risk score.
          type: string
    DomainControllerCoverage:
      type: object
      description: Sensor coverage status for a domain controller.
      properties:
        domainControllerName:
          description: The domain controller name.
          type: string
        domainName:
          description: The domain name.
          type: string
        sensorStatus:
          description: The sensor deployment status.
          type: string
          enum: [Running, Stopped, NotInstalled, Updating]
        sensorVersion:
          description: The sensor version.
          type: string
        lastCommunication:
          description: The last communication time.
          type: string
          format: date-time
    RemediationAccount:
      type: object
      description: A remediation action account configuration.
      properties:
        id:
          description: The account identifier.
          type: string
        accountName:
          description: The account name.
          type: string
        domainName:
          description: The domain name.
          type: string
        isConfigured:
          description: Whether the account is fully configured.
          type: boolean
    RemediationAccountCreate:
      type: object
      description: Request body for creating or updating a remediation account.
      properties:
        accountName:
          description: The account name.
          type: string
        domainName:
          description: The domain name.
          type: string
        password:
          description: The account password.
          type: string
          format: password
      required:
        - accountName
        - domainName
