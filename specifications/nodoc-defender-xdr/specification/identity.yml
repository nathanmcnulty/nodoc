                $ref: '#/components/schemas/RemediationAccount'
        4XX:
          $ref: common.yml#/components/responses/ClientException
    put:
      summary: Update remediation action account
      description: >-
        Update the remediation action account configuration.
      operationId: Identity.UpdateRemediationAccount
      tags: [Identity]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemediationAccountCreate'
      responses:
        '200':
          description: OK
        4XX:
          $ref: common.yml#/components/responses/ClientException
    delete:
      summary: Delete remediation action account
      description: >-
        Remove the remediation action account configuration.
      operationId: Identity.DeleteRemediationAccount
      tags: [Identity]
      responses:
        '200':
          description: OK
        4XX:
          $ref: common.yml#/components/responses/ClientException

