paths:
  /mdi/identity/userapiservice/user/resolve:
    post:
      summary: Resolve identity user
      description: >-
        Resolve a user identity from Microsoft Defender for Identity (MDI).
        Returns detailed user information including lateral movement paths
        and risk assessment data.
      operationId: Identity.ResolveUser
      tags: [Identity]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                accountName:
                  description: The user account name to resolve.
                  type: string
                accountDomain:
                  description: The domain of the user account.
                  type: string
              required:
                - accountName
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityUser'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mdi/identity/userapiservice/user/timeline:
    get:
      summary: Get user timeline
      description: >-
        Retrieve the activity timeline for a specific user from Defender for Identity,
        including sign-in events, lateral movement, and suspicious activities.
      operationId: Identity.GetUserTimeline
      tags: [Identity]
      parameters:
        - name: accountName
          in: query
          description: The user account name.
          schema:
            type: string
        - name: accountDomain
          in: query
          description: The account domain.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - timeline event data
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mdi/identity/identitiesapiservice/identity/entities:
    post:
      summary: List identity entities
      description: >-
        Retrieve a list of identity entities from Defender for Identity.
        Supports filtering and pagination.
      operationId: Identity.ListEntities
      tags: [Identity]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  description: Filter criteria for identity entities.
                  type: object
                pageIndex:
                  description: The page index for pagination.
                  type: integer
                pageSize:
                  description: The number of results per page.
                  type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: common.yml#/components/schemas/PaginatedListResponse
                  - type: object
                    properties:
                      entities:
                        type: array
                        items:
                          $ref: '#/components/schemas/IdentityEntity'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mdi/identity/userapiservice/serviceaccount/entities:
    post:
      summary: List service accounts
      description: >-
        Retrieve a list of service account entities from Defender for Identity.
        Service accounts are automatically identified based on usage patterns.
      operationId: Identity.ListServiceAccounts
      tags: [Identity]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  description: Filter criteria for service accounts.
                  type: object
                pageIndex:
                  description: The page index for pagination.
                  type: integer
                pageSize:
                  description: The number of results per page.
                  type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: common.yml#/components/schemas/PaginatedListResponse
                  - type: object
                    properties:
                      entities:
                        type: array
                        items:
                          type: object
                          description: pending - service account details
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

