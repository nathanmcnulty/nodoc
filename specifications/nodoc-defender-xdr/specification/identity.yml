      operationId: Identity.GetRemediationAccount
      tags: [Identity]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemediationAccount'
        4XX:
          $ref: common.yml#/components/responses/ClientException
    post:
      summary: Create remediation action account
      description: >-
