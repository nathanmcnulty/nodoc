components:
  schemas:
    AttackPath:
      type: object
      description: An attack path identified by the Exposure Management engine.
      properties:
        id:
          description: The unique identifier of the attack path.
          type: string
        name:
          description: The name of the attack path.
          type: string
        description:
          description: A description of the attack path.
          type: string
        riskLevel:
          description: The risk level of the attack path.
          type: string
          enum: [Low, Medium, High, Critical]
        entryPointCount:
          description: Number of entry points.
          type: integer
        targetCount:
          description: Number of target assets.
          type: integer
        nodeCount:
          description: Total nodes in the path.
          type: integer
    ChokePoint:
      type: object
      description: A choke point in the attack path graph.
      properties:
        id:
          description: The asset identifier.
          type: string
        name:
          description: The asset name.
          type: string
        assetType:
          description: The type of asset.
          type: string
        attackPathCount:
          description: Number of attack paths passing through this point.
          type: integer
        riskLevel:
          description: The risk level.
          type: string
    PostureInitiative:
      type: object
      description: A security posture initiative tracked by Exposure Management.
      properties:
        id:
          type: string
          description: Initiative identifier (e.g. saas_security).
        name:
          type: string
          description: Display name of the initiative.
        description:
          type: string
          description: Description of the initiative's scope and purpose.
        score:
          type: number
          format: double
          description: Current initiative score.
        maxScore:
          type: number
          format: double
          description: Maximum possible score.
        initiativeType:
          type: string
          description: Initiative type (e.g. XSPM, TA).
    PostureMetric:
      type: object
      description: A posture oversight metric with scoring and category detail.
      properties:
        id:
          type: string
          description: Metric identifier.
        version:
          type: number
          description: Metric version.
        name:
          type: string
          description: Display name of the metric.
        category:
          type: string
          description: Metric category (e.g. protection, detection).
        description:
          type: string
          description: Description of what the metric measures.
        score:
          type: number
          format: double
        maxScore:
          type: number
          format: double
    PostureSecureScoreMetric:
      allOf:
        - $ref: '#/components/schemas/PostureMetric'
        - type: object
          description: A category-specific secure score metric with history and recommendation detail.
          properties:
            latestCount:
              type: number
              format: double
            latestTotal:
              type: number
              format: double
            latestValue:
              type: number
              format: double
            targetValue:
              type: number
              format: double
            latestCalculatedWeight:
              type: number
              format: double
            latestCalculatedScoreImpact:
              type: number
              format: double
            latestScore:
              type: number
              format: double
            latestCalculationId:
              type: string
            sentimentType:
              type: string
            weight:
              type: number
              format: double
            supportGetAssets:
              type: boolean
            recommendations:
              type: array
              items:
                type: string
            recommendationsV2:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
            workloads:
              type: array
              items:
                type: string
            suggestions:
              type: array
              items:
                type: object
                additionalProperties: true
            dataHistory:
              type: array
              items:
                type: object
                properties:
                  metricId:
                    type: string
                  version:
                    type: number
                  count:
                    type: number
                    format: double
                  total:
                    type: number
                    format: double
                  date:
                    type: string
                    format: date-time
                  providerLastUpdate:
                    type: string
                    format: date-time
                  score:
                    type: number
                    format: double
                  weight:
                    type: number
                    format: double
                  calculationId:
                    type: string
                  scopingProperties:
                    type: object
                    additionalProperties: true
    PostureRecommendation:
      type: object
      description: A posture oversight recommendation.
      properties:
        id:
          type: string
          description: Recommendation identifier (e.g. scid_6090).
        title:
          type: string
          description: Recommendation title.
        category:
          type: string
          description: Recommendation category (e.g. deviceMisconfiguration).
        product:
          type: string
          description: Affected product (e.g. MDATP).
        description:
          type: string
          description: Description of the recommendation.
        severity:
          type: string
          description: Severity level.
        remediation:
          type: string
          description: Remediation guidance.
