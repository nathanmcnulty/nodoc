paths:
  /mtp/k8s/machines/deviceTotals:
    get:
      summary: Get Kubernetes device totals
      description: >-
        Retrieve device count totals for Kubernetes nodes, grouped by risk score,
        exposure score, onboarding status, and asset attributes. Observed live on the
        Exposure Management overview page.
      operationId: ExposureManagement.GetK8sDeviceTotals
      tags: [Exposure Management]
      parameters:
        - name: lookingBackIndays
          in: query
          description: Number of days to look back for device data.
          schema:
            type: integer
            example: 30
        - name: hideLowFidelityDevices
          in: query
          description: Whether to exclude low-fidelity device records.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    DeviceCount:
                      type: integer
                      description: Number of devices matching this group.
                    RiskScore:
                      type: string
                      description: Risk score level (e.g. None, Low, Medium, High, Critical).
                    ExposureScore:
                      type: string
                      description: Exposure score level.
                    AssetValue:
                      type: string
                      nullable: true
                      description: Asset value classification.
                    OnboardingStatus:
                      type: string
                      description: Device onboarding status.
                    DeviceCategory:
                      type: string
                      nullable: true
                      description: Device category classification.
                    IsActiveOnboarded:
                      type: boolean
                    IsNewDevice:
                      type: boolean
                    IsInternetFacing:
                      type: boolean
                    IsCriticalAsset:
                      type: boolean
                    IsLowFidelity:
                      type: boolean
        '401':
          $ref: common.yml#/components/responses/Unauthorized
        '403':
          $ref: common.yml#/components/responses/Forbidden
        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/posture/oversight/tenants:
    get:
      summary: Get posture oversight tenant configuration
      description: >-
        Retrieve tenant configuration and infrastructure details for Exposure Management
        posture oversight, including geo-region, data-center assignments, EASM onboarding
        state, and cluster routing details. Observed live on the Exposure Management overview page.
      operationId: ExposureManagement.GetPostureOversightTenants
      tags: [Exposure Management]
      parameters:
        - name: warmCache
          in: query
          description: Pre-warm the server-side cache before returning data.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orgId:
                    type: string
                    format: uuid
                    description: Organisation identifier.
                  tenantId:
                    type: string
                    format: uuid
                  geoRegion:
                    type: string
                    description: Geographic region for the tenant.
                  dataCenter:
                    type: string
                    description: Primary data center.
                  mpsDataCenter:
                    type: string
                  mpsSliceId:
                    type: integer
                  oversightSliceId:
                    type: integer
                  oversightTvmDedicatedClusterUrl:
                    type: string
                  immuneTvmDedicatedClusterUrl:
                    type: string
                  easmData:
                    type: object
                    description: EASM (External Attack Surface Management) onboarding details.
                    properties:
                      vendorId:
                        type: string
                      vendorName:
                        type: string
                      onboardingDate:
                        type: string
                        format: date-time
                      isPremium:
                        type: boolean
        '401':
          $ref: common.yml#/components/responses/Unauthorized
        '403':
          $ref: common.yml#/components/responses/Forbidden
        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/posture/oversight/initiatives:
    get:
      summary: List posture oversight initiatives
      description: >-
        Retrieve the list of security posture initiatives (e.g. XSPM, Threat Analytics)
        with optional highlights and time-range filtering. Supports pagination. Observed live
        on the Exposure Management overview and initiatives pages.
      operationId: ExposureManagement.ListPostureOversightInitiatives
      tags: [Exposure Management]
      parameters:
        - name: highlights
          in: query
          description: Include highlight metadata for each initiative.
          schema:
            type: boolean
            default: true
        - name: daysAgo
          in: query
          description: Number of days to look back.
          schema:
            type: integer
            example: 90
        - name: initiativeTypes
          in: query
          description: >-
            Filter by initiative types. Can be repeated. Known values: XSPM, TA.
            Use bracket notation (initiativeTypes[0]=XSPM&initiativeTypes[1]=TA).
          style: deepObject
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: calculationId
          in: query
          description: Calculation snapshot ID for deterministic result sets.
          schema:
            type: string
        - name: pagination.pageNumber
          in: query
          schema:
            type: integer
            example: 1
        - name: pagination.numberOfPageRecords
          in: query
          schema:
            type: integer
            example: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/PostureInitiative'
                  recordsCount:
                    type: integer
                  calculationId:
                    type: string
        '401':
          $ref: common.yml#/components/responses/Unauthorized
        '403':
          $ref: common.yml#/components/responses/Forbidden
        '404':
          $ref: common.yml#/components/responses/NotFound

