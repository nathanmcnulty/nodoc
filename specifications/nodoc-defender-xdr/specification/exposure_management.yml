        Top targets are critical assets that are reachable through multiple attack paths.
      operationId: ExposureManagement.GetTopTargets
      tags: [Exposure Management]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  description: Filter criteria.
                  type: object
                pageIndex:
                  type: integer
                pageSize:
                  type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: common.yml#/components/schemas/PaginatedListResponse
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          description: pending - target asset details
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/xspm/hunting:
    post:
      summary: Run XSPM hunting query
      description: >-
        Execute an exposure management hunting query to search for specific
        attack paths or exposure scenarios.
      operationId: ExposureManagement.RunHuntingQuery
      tags: [Exposure Management]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  description: The hunting query to execute.
                  type: string
              required:
                - query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - hunting query results
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/exposureManagement/recommendations:
    get:
      summary: Get exposure recommendations
      description: >-
        Retrieve a paginated list of security recommendations from the
        Exposure Management engine.
      operationId: ExposureManagement.GetRecommendations
      tags: [Exposure Management]
      parameters:
        - name: pageIndex
          in: query
          description: The page index for pagination.
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: common.yml#/components/schemas/PaginatedListResponse
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          description: pending - recommendation details
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

components:
  schemas:
    AttackPath:
      type: object
      description: An attack path identified by the Exposure Management engine.
      properties:
        id:
          description: The unique identifier of the attack path.
          type: string
        name:
          description: The name of the attack path.
          type: string
        description:
          description: A description of the attack path.
          type: string
        riskLevel:
          description: The risk level of the attack path.
          type: string
          enum: [Low, Medium, High, Critical]
        entryPointCount:
          description: Number of entry points.
          type: integer
        targetCount:
          description: Number of target assets.
          type: integer
        nodeCount:
          description: Total nodes in the path.
          type: integer
    ChokePoint:
      type: object
      description: A choke point in the attack path graph.
      properties:
        id:
          description: The asset identifier.
          type: string
        name:
          description: The asset name.
          type: string
        assetType:
          description: The type of asset.
          type: string
        attackPathCount:
          description: Number of attack paths passing through this point.
          type: integer
        riskLevel:
          description: The risk level.
          type: string
    PostureInitiative:
      type: object
      description: A security posture initiative tracked by Exposure Management.
      properties:
        id:
          type: string
          description: Initiative identifier (e.g. saas_security).
        name:
          type: string
          description: Display name of the initiative.
        description:
          type: string
          description: Description of the initiative's scope and purpose.
        score:
          type: number
          format: double
          description: Current initiative score.
        maxScore:
          type: number
          format: double
          description: Maximum possible score.
        initiativeType:
          type: string
          description: Initiative type (e.g. XSPM, TA).
    PostureMetric:
      type: object
      description: A posture oversight metric with scoring and category detail.
      properties:
        id:
          type: string
          description: Metric identifier.
        version:
          type: number
          description: Metric version.
        name:
          type: string
          description: Display name of the metric.
        category:
          type: string
          description: Metric category (e.g. protection, detection).
        description:
          type: string
          description: Description of what the metric measures.
        score:
          type: number
          format: double
        maxScore:
          type: number
          format: double
    PostureRecommendation:
      type: object
      description: A posture oversight recommendation.
      properties:
        id:
          type: string
          description: Recommendation identifier (e.g. scid_6090).
        title:
          type: string
          description: Recommendation title.
        category:
          type: string
          description: Recommendation category (e.g. deviceMisconfiguration).
        product:
          type: string
          description: Affected product (e.g. MDATP).
        description:
          type: string
          description: Description of the recommendation.
        severity:
          type: string
          description: Severity level.
        remediation:
          type: string
          description: Remediation guidance.
