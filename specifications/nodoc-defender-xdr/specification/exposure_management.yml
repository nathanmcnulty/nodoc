  /mtp/xspmatlas/attacksurface/query:
    post:
      summary: Query attack surface graph
      description: >-
        Execute a KQL query against the attack surface graph (XSPMAtlas). Used by the
        Exposure Management overview to compute asset counts, attack path totals, and
        environment breakdowns. The request body accepts a KQL query string and an API
        version. Observed live on the Exposure Management overview page.
      operationId: ExposureManagement.QueryAttackSurface
      tags: [Exposure Management]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: >-
                    KQL query targeting the attack surface graph tables (e.g. Nodes,
                    AttackPathsV2). Queries may use summarize, mv-expand, and union.
                apiVersion:
                  type: string
                  description: Graph API version (e.g. v2).
                  example: v2
                ApiVersion:
                  type: string
                  description: Alternative casing accepted by some callers.
                  example: v2
                options:
                  type: object
                  description: Optional query options.
                  properties:
                    top:
                      type: integer
                      description: Maximum number of results.
                    skip:
                      type: integer
                      description: Number of results to skip.
            examples:
              countCriticalAssets:
                summary: Count critical cloud and identity assets
                value:
                  query: "Nodes | extend isCloud = EntityIds contains \"AwsResourceName\" | extend isCritical = Properties.criticalityLevel.criticalityLevel < 4 | summarize criticalCloudAssets = countif(isCloud and isCritical)"
                  ApiVersion: v2
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRecords:
                    type: integer
                  count:
                    type: integer
                  skipToken:
                    type: string
                    nullable: true
                  data:
                    type: array
                    items:
                      type: object
                      description: Query result row — shape depends on the KQL projection.
        '401':
          $ref: common.yml#/components/responses/Unauthorized
        '403':
          $ref: common.yml#/components/responses/Forbidden
        '404':
          $ref: common.yml#/components/responses/NotFound

