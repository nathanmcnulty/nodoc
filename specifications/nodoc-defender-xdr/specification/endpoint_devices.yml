        Set the criticality level for an endpoint device.
      operationId: EndpointDevices.SetCriticalityLevel
      tags: [Endpoint Devices]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machineId:
                  description: The unique identifier of the device.
                  type: string
                criticalityLevel:
                  description: The criticality level.
                  type: integer
              required:
                - machineId
                - criticalityLevel
      responses:
        '200':
          description: OK
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

