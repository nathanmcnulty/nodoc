components:
  schemas:
    Device:
      type: object
      description: An endpoint device summary from the device inventory.
      properties:
        machineId:
          description: The unique identifier of the device.
          type: string
        computerDnsName:
          description: The DNS name of the device.
          type: string
        osPlatform:
          description: The operating system platform.
          type: string
        osVersion:
          description: The operating system version.
          type: string
        healthStatus:
          description: The health status of the device.
          type: string
        riskScore:
          description: The risk score of the device.
          type: string
        exposureLevel:
          description: The exposure level of the device.
          type: string
        lastSeen:
          description: The last time the device was seen.
          type: string
          format: date-time
        tags:
          description: Tags assigned to the device.
          type: array
          items:
            type: string
    DeviceDetail:
      type: object
      description: Detailed information about an endpoint device.
      properties:
        machineId:
          description: The unique identifier of the device.
          type: string
        computerDnsName:
          description: The DNS name of the device.
          type: string
        osPlatform:
          description: The operating system platform.
          type: string
        osVersion:
          description: The operating system version.
          type: string
        osProcessor:
          description: The processor type.
          type: string
        healthStatus:
          description: The health status of the device.
          type: string
        riskScore:
          description: The risk score of the device.
          type: string
        exposureLevel:
          description: The exposure level of the device.
          type: string
        isAadJoined:
          description: Whether the device is Azure AD joined.
          type: boolean
        aadDeviceId:
          description: The Azure AD device ID.
