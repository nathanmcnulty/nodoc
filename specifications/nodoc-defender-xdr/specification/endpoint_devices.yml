paths:
  /mtp/ndr/machines:
    get:
      summary: List endpoint devices
      description: >-
        Retrieve a paginated list of endpoint devices from the device inventory.
        Supports filtering by low-fidelity devices and configurable lookback period.
      operationId: EndpointDevices.List
      tags: [Endpoint Devices]
      parameters:
        - name: hideLowFidelityDevices
          in: query
          description: Exclude low-fidelity (unmanaged) devices from results.
          schema:
            type: boolean
            default: true
        - name: lookingBackIndays
          in: query
          description: Number of days to look back for device activity.
          schema:
            type: integer
            default: 30
        - name: pageIndex
          in: query
          description: Page number (1-based).
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: Number of devices per page.
          schema:
            type: integer
            default: 25
        - name: sortByField
          in: query
          description: Field to sort results by.
          schema:
            type: string
            default: riskscore
        - name: sortOrder
          in: query
          description: Sort direction.
          schema:
            type: string
            enum: [Ascending, Descending]
        - name: machineSearchPrefix
          in: query
          description: Filter devices by name prefix.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: common.yml#/components/schemas/PaginatedListResponse
                  - type: object
                    properties:
                      machines:
                        type: array
                        items:
                          $ref: '#/components/schemas/Device'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/getMachine/machines:
    get:
      summary: Get endpoint device details
      description: >-
        Retrieve detailed information about a specific endpoint device
        by its machine ID.
      operationId: EndpointDevices.Get
      tags: [Endpoint Devices]
      parameters:
        - name: machineId
          in: query
          required: true
          description: The unique identifier of the device.
          schema:
            type: string
        - name: idType
          in: query
          required: true
          description: The type of identifier used.
          schema:
            type: string
            enum: [SenseMachineId]
            default: SenseMachineId
        - name: readFromCache
          in: query
          description: Whether to read from cache.
          schema:
            type: boolean
            default: true
        - name: lookingBackIndays
          in: query
          description: Number of days to look back.
          schema:
            type: integer
            default: 180
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDetail'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/machineTag/machineTags/{DeviceId}:
    get:
      summary: Get device tags
      description: >-
        Retrieve all tags assigned to a specific endpoint device.
      operationId: EndpointDevices.GetTags
      tags: [Endpoint Devices]
      parameters:
        - name: DeviceId
          in: path
          required: true
          description: The unique identifier of the device.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceTag'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/machineTag/machineTag:
    patch:
      summary: Set device tag
      description: >-
        Add or remove a tag on an endpoint device.
      operationId: EndpointDevices.SetTag
      tags: [Endpoint Devices]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machineId:
                  description: The unique identifier of the device.
                  type: string
                tag:
                  description: The tag value to set.
                  type: string
                action:
                  description: The action to perform.
                  type: string
                  enum: [Add, Remove]
              required:
                - machineId
                - tag
                - action
      responses:
        '200':
          description: OK
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/assetvalue/machineAssetValue:
    post:
      summary: Set device asset value
      description: >-
        Set the asset value classification for an endpoint device.
        Asset values are used to prioritize security operations.
      operationId: EndpointDevices.SetAssetValue
      tags: [Endpoint Devices]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machineId:
                  description: The unique identifier of the device.
                  type: string
                assetValue:
                  description: The asset value classification.
                  type: string
                  enum: [Normal, High, VeryHigh]
              required:
                - machineId
                - assetValue
      responses:
        '200':
          description: OK
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /mtp/assetvalue/setCriticalityLevel:
    post:
      summary: Set device criticality level
