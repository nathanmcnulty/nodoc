components:
  parameters:
    XMsCorrelationId:
      name: x-ms-correlation-id
      description: A unique identifier for correlating requests across services.
      in: header
      schema:
        type: string
        format: uuid
      required: false
  headers:
    Cache-Control:
      description: Directives for caching mechanisms.
      schema:
        type: string
        example: no-cache, no-store
    Content-Type:
      description: The media type of the response body.
      schema:
        type: string
        example: application/json; charset=utf-8
    X-Content-Type-Options:
      description: Prevents MIME-sniffing.
      schema:
        type: string
        example: nosniff
    X-XSS-Protection:
      description: Cross-site scripting filter.
      schema:
        type: string
        example: 1; mode=block
    Strict-Transport-Security:
      description: HTTP Strict Transport Security header.
      schema:
        type: string
        example: max-age=31536000; includeSubDomains
    x-ms-correlation-id:
      description: A correlation identifier for the request.
      schema:
        type: string
        format: uuid
    Date:
      description: The date and time at which the response was generated.
      schema:
        type: string
        format: date-time
    Content-Length:
      description: The length of the response body in bytes.
      schema:
        type: integer
  schemas:
    ErrorResponse:
      type: object
      description: A standard error response from the Defender XDR API.
      properties:
        error:
          type: object
          properties:
            code:
              description: The error code.
              type: string
              example: BadRequest
            message:
              description: A human-readable error message.
              type: string
              example: The request is invalid.
    ShellInfoResponse:
      type: object
      description: Bootstrap asset locations for rendering the Microsoft 365 shell inside Defender.
      properties:
        SharedJSTouchWideUrl:
          description: URL of the wide-layout shell bootstrap JavaScript bundle.
          type: string
          format: uri
          example: https://res-1.cdn.office.net/shellux/suiteux.shell.bootstrapper.js
        SharedJSTouchWideResourceKey:
          description: Resource key associated with the wide-layout shell JavaScript bundle.
          type: string
          example: bootstrapper
        SharedJSTouchNarrowUrl:
          description: URL of the narrow-layout shell bootstrap JavaScript bundle.
          type: string
          format: uri
          example: https://res-1.cdn.office.net/shellux/suiteux.shell.bootstrapper.js
        SharedJSTouchNarrowResourceKey:
          description: Resource key associated with the narrow-layout shell JavaScript bundle.
          type: string
          example: bootstrapper
        SharedJSTouchDeviceUrl:
          description: URL of the device-layout shell bootstrap JavaScript bundle.
          type: string
          format: uri
          example: https://res-1.cdn.office.net/shellux/suiteux.shell.bootstrapper.js
        SharedJSTouchDeviceResourceKey:
          description: Resource key associated with the device-layout shell JavaScript bundle.
          type: string
          example: bootstrapper
        SharedCSSTouchWideUrl:
          description: URL of the wide-layout shell CSS bundle.
          type: string
          format: uri
          example: https://res-1.cdn.office.net/shellux/suiteux.shell.css
        SharedCSSTouchWideResourceKey:
          description: Resource key associated with the wide-layout shell CSS bundle.
          type: string
          example: bootstrapper
        SharedCSSTouchNarrowUrl:
          description: URL of the narrow-layout shell CSS bundle.
          type: string
          format: uri
          example: https://res-1.cdn.office.net/shellux/suiteux.shell.css
        SharedCSSTouchNarrowResourceKey:
          description: Resource key associated with the narrow-layout shell CSS bundle.
          type: string
          example: bootstrapper
        SharedCSSTouchDeviceUrl:
          description: URL of the device-layout shell CSS bundle.
          type: string
          format: uri
          example: https://res-1.cdn.office.net/shellux/suiteux.shell.css
        SharedCSSTouchDeviceResourceKey:
          description: Resource key associated with the device-layout shell CSS bundle.
          type: string
          example: bootstrapper
    GraphUser:
      type: object
      description: Lightweight Graph user projected through the Defender Graph proxy.
      properties:
        displayName:
          description: Display name of the user.
          type: string
          example: On-Premises Directory Synchronization Service Account
        id:
          description: Entra object ID of the user.
          type: string
          format: uuid
          example: 047abaaa-1111-2222-3333-444444444444
        onPremisesSyncEnabled:
          description: Whether the user is synchronized from on-premises Active Directory.
          type: boolean
          nullable: true
          example: true
    GraphUsersResponse:
      type: object
      description: OData list response returned by the Defender Graph users proxy.
      properties:
        '@odata.context':
          description: OData metadata URI describing the selected Graph projection.
          type: string
          format: uri
          example: https://graph.microsoft.com/v1.0/$metadata#users(displayName,id,onPremisesSyncEnabled)
        '@odata.nextLink':
          description: Pagination URL for retrieving the next page of users.
          type: string
          format: uri
          example: https://graph.microsoft.com/v1.0/users?$skiptoken=...
        value:
          description: Users returned by the current page.
          type: array
          items:
            $ref: '#/components/schemas/GraphUser'
    UserPreferenceBlobResponse:
      type: object
      description: Serialized portal preference blobs returned for the signed-in Defender user.
      properties:
        advanced_hunting:
          description: JSON-serialized preferences for advanced hunting tabs, query text, layout, and time range.
          type: string
          example: '{"tabs":{"queryTabs":[{"modifiedQueryText":"..."}]}}'
        advanced_hunting_mto:
          description: JSON-serialized preferences for multi-tenant advanced hunting experiences.
          type: string
          example: '{"tabs":{"queryTabs":[]}}'
        defender_boxed:
          description: JSON-serialized preferences for boxed Defender experiences and layout state.
          type: string
          example: '{"dismissedCards":[]}'
        user_preferences:
          description: JSON-serialized general user preferences for the portal shell.
          type: string
          example: '{"theme":"default"}'
  responses:
    BadRequest:
      description: Bad Request - The request was malformed or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized - Authentication is required or has failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden - The authenticated user does not have sufficient permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found - The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ClientException:
      description: Client Error - An error occurred processing the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
