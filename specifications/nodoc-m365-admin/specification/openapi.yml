x-nodoc-headerProfiles:
  m365-admin-homepage:
    description: Homepage-backed same-origin M365 Admin profile used for dashboard reads and token-broker traffic.
    requiredHeaders:
      - name: AjaxSessionKey
        description: Portal session key captured during admin shell bootstrap.
      - name: x-portal-routekey
        description: Route key issued by the admin shell and reused on same-origin requests.
      - name: x-adminapp-request
        value: /homepage
        description: Admin shell context path for homepage-backed requests.
      - name: x-ms-mac-appid
        description: Blade-specific admin portal application identifier. Live captures show that this value changes between portal experiences.
      - name: x-ms-mac-hostingapp
        value: M365AdminPortal
        description: Hosting application name emitted by the admin shell.
    observedHeaders:
      - name: x-ms-mac-appid
        value: 050829af-7f24-4897-8f81-732bf47719ad
        description: Observed on live homepage-backed token broker requests.
      - name: x-ms-mac-target-app
        value: MAC
        description: Additional routing context observed on same-origin homepage requests.
      - name: x-ms-mac-version
        value: host-mac_2026.4.2.8
        description: Observed shell version header. Treat this as volatile.
      - name: Referer
        value: https://admin.cloud.microsoft/
        description: Root admin referer emitted by the live homepage shell.
  m365-admin-microsoft-search:
    description: Same-origin M365 Admin profile used by Search & intelligence and Search Answers recommendation reads.
    requiredHeaders:
