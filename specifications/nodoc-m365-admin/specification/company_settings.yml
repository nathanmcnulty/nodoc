  /admin/api/Settings/company/theme/v2:
    get:
      summary: Get company theme
      description: >-
        Retrieve the company branding theme settings including logos, colors, and banner text.
      operationId: CompanySettings.GetTheme
      tags: [CompanySettings]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - theme settings
        4XX:
          $ref: common.yml#/components/responses/ClientException
    put:
      summary: Set company theme
      description: >-
        Update the company branding theme settings.
      operationId: CompanySettings.SetTheme
      tags: [CompanySettings]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: pending - theme update body
      responses:
        '200':
          description: OK
        4XX:
          $ref: common.yml#/components/responses/ClientException

