  /fd/mssearchconnectors/v1.0/admin/connections:
    get:
      summary: List search connector connections
      description: >-
        Retrieve the Microsoft Search connector inventory shown by the connectors experience.
      operationId: Search.ListConnectorConnections
      tags: [Search]
      parameters:
        - name: useRpcOverRest
          in: query
          description: Toggle the connector service RPC-over-REST projection used by the portal.
          schema:
            type: boolean
            default: true
      x-nodoc-operation-context:
        surface: Settings > Search & intelligence
        workflows:
          - Open Search connectors and load the current connector inventory.
        headerProfile: m365-admin-microsoft-search
        variants:
          - location: query
            selector: useRpcOverRest
            knownValues:
              - 'true'
            notes: The live homepage request used the RPC-over-REST projection.
        provenance:
          - source: live-portal-capture
            confidence: high
            notes:
              - Verified on the signed-in `#/MicrosoftSearch` route with `useRpcOverRest=true`.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Connector inventory payload. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/mssearchinsights/api/v1/{tenantId}/status/reportdata:
    get:
      summary: Get search insights report readiness
      description: >-
        Retrieve readiness and availability status for Search insights reports for the current tenant.
      operationId: Search.GetInsightsReportStatus
      tags: [Search]
      parameters:
        - name: tenantId
          in: path
          required: true
          description: The tenant identifier used by the Search insights service.
          schema:
            type: string
            format: uuid
        - name: reports
          in: query
          required: true
          description: Comma-delimited report names to check.
          schema:
            type: string
        - name: daysToCheck
          in: query
          required: false
          description: Number of trailing days to validate for report readiness.
          schema:
            type: integer
            default: 28
      x-nodoc-operation-context:
        surface: Settings > Search & intelligence
        workflows:
          - Open Search analytics and load report readiness state before rendering analytics cards.
        headerProfile: m365-admin-microsoft-search
        provenance:
          - source: live-portal-capture
            confidence: high
            notes:
              - Verified on the signed-in `#/MicrosoftSearch` route using `reports=AdoptionSummary`.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Search insights report readiness payload. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/mssearchinsights/api/v1/{tenantId}/TenantReports/GenericReport:
    post:
      summary: Get a generic search insights report
      description: >-
        Retrieve a Search insights report using the generic report endpoint.
      operationId: Search.GetInsightsGenericReport
      tags: [Search]
      parameters:
        - name: tenantId
          in: path
          required: true
          description: The tenant identifier used by the Search insights service.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StartDateUtc:
                  type: string
                  format: date
                EndDateUtc:
                  type: string
                  format: date
                Interval:
                  type: string
                Filters:
                  type: object
                  additionalProperties: true
                Fields:
                  type: array
                  items:
                    type: string
      x-nodoc-operation-context:
        surface: Settings > Search & intelligence
        workflows:
          - Open Search analytics and request the summary report payload for the homepage cards.
        headerProfile: m365-admin-microsoft-search
        requestShapes:
          - name: search-analytics-card-report
            contentType: application/json
            bodyKind: report-query
            requiredParameters:
              - StartDateUtc
              - EndDateUtc
              - Interval
              - Fields
            notes: The live portal requested the `SearchAnalyticsCard` field set over a date range with empty filters.
        provenance:
          - source: live-portal-capture
            confidence: high
            notes:
              - Verified on the signed-in `#/MicrosoftSearch` route.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Search insights report payload. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

