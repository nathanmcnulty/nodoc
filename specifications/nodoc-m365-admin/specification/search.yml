  /admin/api/searchadminapi/firstrunexperience/get:
    post:
      summary: Get search first-run experience settings
      description: >-
        Retrieve the first-run experience flags and dismissal state values used by the
        Search & intelligence homepage.
      operationId: Search.GetFirstRunExperience
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
              description: The list of first-run experience setting keys to retrieve.
      x-nodoc-operation-context:
        surface: Settings > Search & intelligence
        workflows:
          - Open the Search & intelligence landing page and hydrate the first-run experience banners and cards.
        headerProfile: m365-admin-microsoft-search
        requestShapes:
          - name: search-first-run-experience
            contentType: application/json
            bodyKind: string-array
            notes: The live portal posts an array of first-run experience keys to retrieve in one call.
        provenance:
          - source: live-portal-capture
            confidence: high
            notes:
              - Verified on the signed-in `#/MicrosoftSearch` route with a JSON array body.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: First-run experience settings payload. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/searchadminapi/Qnas:
    post:
      summary: Get search Q&A answers
      description: >-
        Retrieve the search Q&A (Questions and Answers) bookmarks configured for
        the tenant. Supports filtering by service type and status.
      operationId: Search.GetQnas
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ServiceType:
                  type: string
                  description: The service type to filter Q&As for.
                  default: Bing
                Filter:
                  type: string
                  description: Filter for Q&A status (e.g., Published, Draft).
                  default: Published
      x-nodoc-operation-context:
        surface: Settings > Search & intelligence
        workflows:
          - Open Microsoft Search Q&A administration and filter the Q&A list.
        headerProfile: m365-admin-microsoft-search
        requestShapes:
          - name: search-qna-filter
            contentType: application/json
            bodyKind: query-object
            requiredParameters:
              - ServiceType
              - Filter
            notes: The search admin surface uses a JSON body for list filters rather than query parameters.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: Q&A answer details. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

