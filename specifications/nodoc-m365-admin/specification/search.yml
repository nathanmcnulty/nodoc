paths:
  /admin/api/searchadminapi/configurations:
    get:
      summary: Get search configurations
      description: >-
        Retrieve the Microsoft Search admin configurations for the tenant.
      operationId: Search.GetConfigurations
      tags: [Search]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Search configurations. Exact schema pending.
        4XX:
          $ref: common.yml#/components/responses/ClientException

  /admin/api/searchadminapi/Qnas:
    post:
      summary: Get search Q&A answers
      description: >-
        Retrieve the search Q&A (Questions and Answers) bookmarks configured for
        the tenant. Supports filtering by service type and status.
      operationId: Search.GetQnas
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ServiceType:
                  type: string
                  description: The service type to filter Q&As for.
                  default: Bing
                Filter:
                  type: string
                  description: Filter for Q&A status (e.g., Published, Draft).
                  default: Published
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: Q&A answer details. Exact schema pending.
        4XX:
          $ref: common.yml#/components/responses/ClientException

  /admin/api/searchadminapi/news/options/Bing:
    get:
      summary: Get Bing news options
      description: >-
        Retrieve the Bing news integration options for Microsoft Search.
      operationId: Search.GetBingNewsOptions
      tags: [Search]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Bing news options. Exact schema pending.
        4XX:
          $ref: common.yml#/components/responses/ClientException

  /admin/api/searchadminapi/UDTConnectorsSummary:
    get:
      summary: Get connectors summary
      description: >-
        Retrieve a summary of User-Defined Type (UDT) data connectors for Microsoft Search.
      operationId: Search.GetConnectorsSummary
      tags: [Search]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: UDT connectors summary. Exact schema pending.
        4XX:
          $ref: common.yml#/components/responses/ClientException

  /fd/mssearchconnectors/v1.0/admin/connections/getStatistics:
    get:
      summary: Get connection statistics
      description: >-
        Retrieve statistics for Microsoft Search data connections including
        item counts, crawl status, and connection health.
      operationId: Search.GetConnectionStatistics
      tags: [Search]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Connection statistics. Exact schema pending.
        4XX:
          $ref: common.yml#/components/responses/ClientException