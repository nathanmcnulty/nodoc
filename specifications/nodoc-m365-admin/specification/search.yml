paths:
  /admin/api/searchadminapi/configurations:
    get:
      summary: Get search configurations
      description: >-
        Retrieve the Microsoft Search admin configurations for the tenant.
      operationId: Search.GetConfigurations
      tags: [Search]
      parameters:
        - name: query
          in: query
          description: Search query string.
          schema:
            type: string
      x-nodoc-operation-context:
        surface: Settings > Search & intelligence
        workflows:
          - Open Search & intelligence and retrieve configuration-backed settings.
        headerProfile: m365-admin-microsoft-search
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Search configurations. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/searchadminapi/searchintelligencehome/cards:
