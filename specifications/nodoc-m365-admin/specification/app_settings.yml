paths:
  /admin/api/settings/apps/bookings:
    get:
      summary: Get Bookings settings
      description: >-
        Retrieve the Microsoft Bookings application settings for the tenant.
      operationId: AppSettings.GetBookings
      tags: [AppSettings]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Bookings application settings. Exact schema pending.
        4XX:
          $ref: common.yml#/components/responses/ClientException
    post:
      summary: Set Bookings settings
      description: >-
        Update the Microsoft Bookings application settings for the tenant.
      operationId: AppSettings.SetBookings
      tags: [AppSettings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Merged Bookings settings payload.
      responses:
        '200':
          description: OK
        4XX:
          $ref: common.yml#/components/responses/ClientException

