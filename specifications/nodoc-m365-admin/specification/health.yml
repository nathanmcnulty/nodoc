paths:

  /admin/api/messagecenter:
    get:
      summary: Get message center messages
      description: >-
        Retrieve message center messages for the tenant including service updates and advisories (Health > Message center).
      operationId: MessageCenter.GetMessages
      tags: [MessageCenter]
      parameters:
        - $ref: common.yml#/components/parameters/ODataFilter
        - $ref: common.yml#/components/parameters/ODataTop
        - $ref: common.yml#/components/parameters/ODataSkip
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/messagecenter/GetDisplayPreferences:
    get:
      summary: Get message center display preferences
      description: >-
        Retrieve display preferences for the message center view (Health > Message center).
      operationId: MessageCenter.GetDisplayPreferences
      tags: [MessageCenter]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/messagecenter/GetPlannerIntegrationPreferences:
    get:
      summary: Get Planner integration preferences
      description: >-
        Retrieve Planner integration preferences for message center. Note: returns 404 if Planner integration has not been set up for the tenant (Health > Message center).
      operationId: MessageCenter.GetPlannerIntegrationPreferences
      tags: [MessageCenter]
      responses:
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

  /admin/api/messagecenter/GetPlannerIntegrationTaskSet:
    get:
