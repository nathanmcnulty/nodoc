  /admin/api/messagecenter/activities:
    put:
      summary: Update message center activities
      description: >-
        Update message center activity tracking such as read/unread status and preferences (Health > Message center).
      operationId: MessageCenter.UpdateActivities
      tags: [MessageCenter]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: pending
      responses:
        '200':
          description: OK
