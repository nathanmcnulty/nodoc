  /admin/api/users/tokenWithExpiry:
    post:
      summary: Get token with expiry
      description: >-
        Retrieve a brokered token with expiry information for the current user.
      operationId: UsersGroups.GetTokenWithExpiry
      tags: [UsersGroups]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: string
              description: >-
                Raw form payload posted by the portal, for example
                `=https://management.azure.com/`.
            example: =https://management.azure.com/
      x-nodoc-operation-context:
        surface: Users > Active users
        workflows:
          - Open an experience that needs a downstream resource token from the admin portal.
        headerProfile: m365-admin-homepage
        requestShapes:
          - name: downstream-audience-token
            contentType: application/x-www-form-urlencoded; charset=UTF-8
            bodyKind: raw-form-urlencoded
            notes: The portal posts the requested audience as an unnamed form value.
        variants:
          - location: body
            selector: audience
            knownValues:
              - https://management.azure.com/
            notes: The returned token shape depends on the requested audience.
        availability:
          level: request-dependent
          notes:
            - Acceptance and returned token content are sensitive to the downstream audience value.
        provenance:
          - source: module-validation
            confidence: high
            notes:
              - Validated against the checked-in M365Internals implementation and known issues notes.
          - source: live-portal-capture
            confidence: high
            notes:
              - Verified in the signed-in homepage shell with body `=https://management.azure.com/` and the `/homepage` admin context.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - AccessToken
                  - Expiry
                properties:
                  AccessToken:
                    type: string
                    description: Raw JWT access token for the requested downstream audience.
                  Expiry:
                    type: string
                    format: date-time
                    description: UTC expiry timestamp returned by the portal token broker.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

