                  - ProductSkuId: f30db892-07e9-47e9-837c-80727f46fd3d
                    AccountName: contoso
                    SkuPartNumber: FLOW_FREE
                    IsSelected: false
                    IsPreviouslySelected: false
                    IsDisabled: false
                    IsLicenseDisabledState: false
                    IsAssignable: true
                    ProductDisplayName: Microsoft Power Automate Free
                    TotalUnits: 10000
                    AvailableUnits: 9997
                    WarningUnits: 0
                    HasUnlimitedSeats: false
                    ServicePlans:
                      - ServicePlan:
                          ServiceName: DYN365_CDS_VIRAL
                          ServicePlanId: 17ab22cd-a0b3-4536-910a-cb6eb12696c0
                          ServiceType: CRM
                          TargetClass: 1
                          AppliesTo: null
