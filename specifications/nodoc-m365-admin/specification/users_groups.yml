paths:
  /admin/api/users/getuserroles:
    post:
      summary: Get user roles
      description: >-
        Retrieve the admin roles assigned to a user. Accepts a principal ID and
        security group memberships to resolve role assignments.
      operationId: UsersGroups.GetUserRoles
      tags: [UsersGroups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PrincipalId:
                  type: string
                  description: The principal (user) ID to look up roles for.
                UserSecurityGroups:
                  type: array
                  description: List of security group IDs the user belongs to.
                  items:
                    type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: User role assignments. Exact schema pending.
        4XX:
          $ref: common.yml#/components/responses/ClientException

  /admin/api/Users/ListUsers:
    post:
      summary: List users
      description: >-
        Retrieve a paginated list of users in the tenant with sorting and filtering options.
      operationId: UsersGroups.ListUsers
      tags: [UsersGroups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ListAction:
                  type: integer
                  description: The list action type. Use -1 for initial load.
                  default: -1
                SortDirection:
                  type: integer
                  description: Sort direction (0 = ascending, 1 = descending).
                  default: 0
                SortPropertyName:
                  type: string
                  description: Property name to sort by.
                  default: DisplayName
                ListContext:
                  type: string
                  nullable: true
                  description: Continuation context for pagination.
                SearchText:
                  type: string
                  description: Search text to filter users.
                  default: ''
                SelectedView:
                  type: string
                  nullable: true
                  description: Selected view filter.
                SelectedViewType:
                  type: string
                  nullable: true
                  description: Selected view type filter.
                ServerContext:
                  type: string
                  nullable: true
                  description: Server-side continuation context.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Paginated user list. Exact schema pending.
        4XX:
          $ref: common.yml#/components/responses/ClientException

  /admin/api/users/contextualalerts:
    post:
      summary: Get contextual alerts
      description: >-
        Retrieve contextual alerts for the current admin user session.
      operationId: UsersGroups.GetContextualAlerts
      tags: [UsersGroups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Empty object. No properties required.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Contextual alerts. Exact schema pending.
        4XX:
          $ref: common.yml#/components/responses/ClientException

  /admin/api/groups/GetGroups:
    post:
      summary: Get groups
      description: >-
        Retrieve a paginated list of groups in the tenant with sorting and filtering options.
      operationId: UsersGroups.GetGroups
      tags: [UsersGroups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PageToken:
                  type: string
                  nullable: true
                  description: Pagination token for subsequent pages.
                GroupTypes:
                  type: string
                  nullable: true
                  description: Filter by group types.
                SearchString:
                  type: string
                  description: Search string to filter groups.
                  default: ''
                SortDirection:
                  type: integer
                  description: Sort direction (0 = ascending, 1 = descending).
                  default: 0
                SortField:
                  type: string
                  description: Field name to sort by.
                  default: GroupName
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Paginated group list. Exact schema pending.
        4XX:
          $ref: common.yml#/components/responses/ClientException