          application/json:
            schema:
              type: object
              properties:
                PageToken:
                  type: string
                  nullable: true
                  description: Pagination token for subsequent pages.
                GroupTypes:
                  type: string
                  nullable: true
                  description: Filter by group types.
                SearchString:
                  type: string
                  description: Search string to filter groups.
                  default: ''
                SortDirection:
                  type: integer
                  description: Sort direction (0 = ascending, 1 = descending).
                  default: 0
                SortField:
                  type: string
                  description: Field name to sort by.
                  default: GroupName
      responses:
        '200':
          description: OK
          content:
            application/json:
