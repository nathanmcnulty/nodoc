paths:
  /admin/api/users/getuserroles:
    get:
      summary: Get user roles
      description: >-
        Retrieve the admin roles assigned to the current user.
      operationId: Users.GetUserRoles
      tags: [UsersGroups]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - user roles
        4XX:
          $ref: common.yml#/components/responses/ClientException

  /admin/api/Users/ListUsers:
