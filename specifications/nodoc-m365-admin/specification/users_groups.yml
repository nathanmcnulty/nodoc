              - SortDirection
              - SortField
            notes: The portal uses body parameters instead of query parameters for paging and filtering.
        variants:
          - location: body
            selector: GroupTypes
            notes: GroupTypes narrows the result set to a specific group family.
      responses:
        '200':
          description: OK
          content:
            application/json:
