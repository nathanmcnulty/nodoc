paths:
  /admin/api/users/getuserroles:
    post:
      summary: Get user roles
      description: >-
        Retrieve the admin roles assigned to a user. Accepts a principal ID and
        security group memberships to resolve role assignments.
      operationId: UsersGroups.GetUserRoles
      tags: [UsersGroups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PrincipalId:
                  type: string
                  description: The principal (user) ID to look up roles for.
                UserSecurityGroups:
                  type: array
                  description: List of security group IDs the user belongs to.
                  items:
                    type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: User role assignments. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/Users/ListUsers:
    post:
      summary: List users
      description: >-
        Retrieve a paginated list of users in the tenant with sorting and filtering options.
      operationId: UsersGroups.ListUsers
      tags: [UsersGroups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ListAction:
                  type: integer
                  description: The list action type. Use -1 for initial load.
                  default: -1
                SortDirection:
                  type: integer
                  description: Sort direction (0 = ascending, 1 = descending).
                  default: 0
                SortPropertyName:
                  type: string
                  description: Property name to sort by.
                  default: DisplayName
                ListContext:
                  type: string
                  nullable: true
                  description: Continuation context for pagination.
                SearchText:
                  type: string
                  description: Search text to filter users.
                  default: ''
                SelectedView:
                  type: string
                  nullable: true
                  description: Selected view filter.
                SelectedViewType:
                  type: string
                  nullable: true
                  description: Selected view type filter.
                ServerContext:
                  type: string
                  nullable: true
                  description: Server-side continuation context.
      x-nodoc-operation-context:
        surface: Users > Active users
        workflows:
          - Open Active users and page or filter the tenant user inventory.
        headerProfile: m365-admin-homepage
        requestShapes:
          - name: paginated-user-list
            contentType: application/json
            bodyKind: query-object
            requiredParameters:
              - ListAction
              - SortDirection
              - SortPropertyName
            notes: The portal uses body parameters instead of query parameters for paging and filtering.
        variants:
          - location: body
            selector: SearchText
            notes: SearchText is used for free-text filtering.
          - location: body
            selector: SelectedView
            notes: SelectedView and SelectedViewType scope the list to saved portal views.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Paginated user list. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/users/contextualalerts:
    post:
      summary: Get contextual alerts
