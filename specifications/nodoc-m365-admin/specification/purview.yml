paths:
  /fd/purview/apiproxy/di/find/PurviewForAI:
    get:
      summary: Get Purview for AI findings
      description: >-
        Retrieve Purview for AI findings and compliance status. Used by the admin
        center to display AI compliance and governance settings including oversharing
        and data leak recommendations.
      operationId: Purview.GetPurviewForAI
      tags: [Purview]
      parameters:
        - name: tenantId
          in: query
          description: The tenant ID to query.
          schema:
            type: string
            format: uuid
        - name: filter
          in: query
          description: OData-style filter expression for narrowing results.
          schema:
            type: string
        - name: startTime
          in: query
          description: Start time for the query period (ISO 8601).
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          description: End time for the query period (ISO 8601).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Purview for AI findings. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/purview/apiproxy/di/find/DlpCompliancePolicy:
    get:
      summary: Get DLP compliance policies
      description: >-
        Retrieve Data Loss Prevention (DLP) compliance policies configured
        in Microsoft Purview.
      operationId: Purview.GetDlpPolicies
      tags: [Purview]
      parameters:
        - name: tenantId
          in: query
          description: The tenant ID to query.
          schema:
            type: string
            format: uuid
        - name: filter
          in: query
          description: OData-style filter expression for narrowing results.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: DLP policy details. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/purview/apiproxy/di/find/DlpSensitiveInformationType:
    get:
      summary: Get DLP sensitive information types
      description: >-
        Retrieve the list of sensitive information types configured in
        Microsoft Purview DLP.
      operationId: Purview.GetSensitiveInfoTypes
      tags: [Purview]
      parameters:
        - name: tenantId
          in: query
          description: The tenant ID to query.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: Sensitive information type details. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/purview/apiproxy/cpm/v1.0/Tenant/AIBaselineSummary:
    get:
      summary: Get AI baseline summary
      description: >-
        Retrieve the AI baseline summary from Purview Compliance Policy Manager,
        showing the tenant compliance posture for AI workloads. Requires Purview
        context headers (tenantid, x-tid, client-type, client-version).
      operationId: Purview.GetAIBaselineSummary
      tags: [Purview]
      parameters:
        - name: tenantid
          in: header
          description: The tenant ID (Purview context header).
          schema:
            type: string
            format: uuid
        - name: x-tid
          in: header
          description: The tenant ID (alternative Purview context header).
          schema:
            type: string
            format: uuid
        - name: client-type
          in: header
          description: The client type.
          schema:
            type: string
            default: purview
        - name: client-version
          in: header
          description: The client version.
          schema:
            type: string
            default: 1.0.2774.1
        - name: client-request-id
          in: header
          description: A unique request correlation ID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: AI baseline summary. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/purview/api/boot/getNexusBootInfo:
    get:
      summary: Get Nexus boot info
      description: >-
        Retrieve the Purview Nexus portal bootstrap information, including
        available features and service endpoints.
      operationId: Purview.GetNexusBootInfo
      tags: [Purview]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Nexus boot information. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound