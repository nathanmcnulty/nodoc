        Retrieve the Office 365 guest user sharing and access settings.
      operationId: SecuritySettings.GetO365GuestUser
      tags: [SecuritySettings]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - O365 guest user settings
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
