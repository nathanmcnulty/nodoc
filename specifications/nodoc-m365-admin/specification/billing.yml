paths:
  /admin/api/billing/BillingModel:
    get:
      summary: Get billing model
      description: >-
        Retrieve the billing model information for the tenant.
      operationId: Billing.GetBillingModel
      tags: [Billing]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/BillingModelResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/arm/providers/Microsoft.Billing/billingAccounts/{billingAccountId}:
    get:
      summary: Get billing account details
      description: >-
        Retrieve a specific billing account record from the ARM billing proxy,
        including account type, agreement type, sold-to details, and qualification metadata.
      operationId: Billing.GetBillingAccount
      tags: [Billing]
      parameters:
        - name: billingAccountId
          in: path
          required: true
          description: The ARM billing account identifier.
          schema:
            type: string
        - name: api-version
          in: query
          description: ARM API version used by the billing account detail request.
          schema:
            type: string
            default: '2022-10-01-privatepreview'
        - name: $expand
          in: query
          description: Optional expansion requested by the portal for sold-to details.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Billing account detail payload. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/arm/providers/Microsoft.Billing/billingAccounts/{billingAccountId}/billingProfiles:
    get:
      summary: List billing profiles
      description: >-
        Retrieve billing profiles for a billing account, including sold-to, bill-to,
        invoice, and spending-limit metadata.
      operationId: Billing.ListBillingProfiles
      tags: [Billing]
      parameters:
        - name: billingAccountId
          in: path
          required: true
          description: The ARM billing account identifier.
          schema:
            type: string
        - name: api-version
          in: query
          description: ARM API version used by the billing profile request.
          schema:
            type: string
            default: '2022-10-01-privatepreview'
        - name: $filter
          in: query
          description: Optional filter expression applied to billing profile status values.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalCount:
                    type: integer
                  value:
                    type: array
                    items:
                      type: object
                      description: Billing profile record. Exact schema pending.
                additionalProperties: true
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/arm/providers/Microsoft.Billing/billingAccounts/{billingAccountId}/billingRoleAssignments:
    get:
      summary: List billing role assignments
      description: >-
        Retrieve billing role assignments for the selected billing account, typically
        filtered to the current operator.
      operationId: Billing.ListBillingRoleAssignments
      tags: [Billing]
      parameters:
        - name: billingAccountId
          in: path
          required: true
          description: The ARM billing account identifier.
          schema:
            type: string
        - name: api-version
          in: query
          description: ARM API version used by the billing role assignment request.
          schema:
            type: string
            default: '2020-12-15-privatepreview'
        - name: $filter
          in: query
          description: Optional assignment filter requested by the portal.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    type: array
                    items:
                      type: object
                      description: Billing role assignment record. Exact schema pending.
                additionalProperties: true
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/arm/providers/Microsoft.Billing/billingAccounts/{billingAccountId}/billingSubscriptions:
    get:
      summary: List billing subscriptions
      description: >-
        Retrieve billing subscriptions associated with the selected billing account,
        including product, quantity, term, and renewal metadata.
      operationId: Billing.ListBillingSubscriptions
      tags: [Billing]
      parameters:
        - name: billingAccountId
          in: path
          required: true
          description: The ARM billing account identifier.
          schema:
            type: string
        - name: api-version
          in: query
          description: ARM API version used by the billing subscription request.
          schema:
            type: string
            default: '2024-08-01-preview'
        - name: excludeCharges
          in: query
          description: Whether charge details should be excluded from the result.
          schema:
            type: boolean
        - name: $includePartnerAssets
          in: query
          description: Whether partner asset metadata should be included.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalCount:
                    type: integer
                  value:
                    type: array
                    items:
                      type: object
                      description: Billing subscription record. Exact schema pending.
                additionalProperties: true
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/bsxcommerce/v1/moderncatalog/listcategories:
    get:
      summary: List marketplace categories
      description: >-
        Retrieve the Microsoft 365 marketplace category list used by the catalog browse experience.
      operationId: Billing.ListMarketplaceCategories
      tags: [Billing]
      parameters:
        - name: market
          in: query
          description: Market code used by the marketplace request.
          schema:
            type: string
        - name: pricingAudience
          in: query
          description: Pricing audience requested by the marketplace client.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/bsxcommerce/v1/moderncatalog/browsecatalog:
    get:
      summary: Browse marketplace catalog
      description: >-
        Retrieve read-only marketplace catalog browse results used by the Microsoft 365
        marketplace landing experience. This capture reflects page-load catalog reads,
        not a checkout or purchase submission.
      operationId: Billing.BrowseMarketplaceCatalog
      tags: [Billing]
      parameters:
        - name: productfamily
          in: query
          schema:
            type: string
        - name: offerType
          in: query
          schema:
            type: string
        - name: market
          in: query
          schema:
            type: string
        - name: fieldsTemplate
          in: query
          schema:
            type: string
        - name: actionFilter
          in: query
          schema:
            type: string
        - name: pricingAudience
          in: query
          schema:
            type: string
        - name: nationalCloud
          in: query
          schema:
            type: string
        - name: filterCategoryProducts
          in: query
          schema:
            type: boolean
        - name: stateFilter
          in: query
          schema:
            type: string
        - name: accountId
          in: query
          schema:
            type: string
        - name: orgId
          in: query
          schema:
            type: string
        - name: bgId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: Marketplace catalog result group. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/bsxcommerce/v1/moderncatalog/browsecatalogforpreview:
    get:
      summary: Browse marketplace preview catalog
      description: >-
        Retrieve marketplace preview catalog results used by the marketplace experience.
        This is a read-only preview browse request observed during page load.
      operationId: Billing.BrowseMarketplaceCatalogPreview
      tags: [Billing]
      parameters:
        - name: market
          in: query
          schema:
            type: string
        - name: languages
          in: query
          schema:
            type: string
        - name: fieldsTemplate
          in: query
          schema:
            type: string
        - name: actionFilter
          in: query
          schema:
            type: string
        - name: pricingAudience
          in: query
          schema:
            type: string
        - name: internalPreview
          in: query
          schema:
            type: boolean
        - name: nationalCloud
          in: query
          schema:
            type: string
        - name: accountId
          in: query
          schema:
            type: string
        - name: orgId
          in: query
          schema:
            type: string
        - name: bgId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: Preview marketplace catalog result. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/bsxcommerce/v1/moderncatalog/marketinggroups:
    get:
      summary: Get marketplace marketing groups
      description: >-
        Retrieve marketplace marketing groups and featured product bundles shown on the
        Microsoft 365 marketplace landing experience.
      operationId: Billing.GetMarketplaceMarketingGroups
      tags: [Billing]
      parameters:
        - name: languages
          in: query
          schema:
            type: string
        - name: market
          in: query
          schema:
            type: string
        - name: fieldsTemplate
          in: query
          schema:
            type: string
        - name: pricingAudience
          in: query
          schema:
            type: string
        - name: nationalCloud
          in: query
          schema:
            type: string
        - name: accountId
          in: query
          schema:
            type: string
        - name: orgId
          in: query
          schema:
            type: string
        - name: bgId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Marketplace marketing groups payload. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/bsxcommerce/v1/moderncatalog/new/prices:
    get:
      summary: Get marketplace price quotes
      description: >-
        Retrieve read-only marketplace price quotes for selected product and term combinations.
        The portal emitted this request while browsing marketplace offers, without submitting
        a purchase flow.
      operationId: Billing.GetMarketplacePrices
      tags: [Billing]
      parameters:
        - name: psats
          in: query
          description: Selected product and term identifiers requested for pricing.
          schema:
            type: string
        - name: market
          in: query
          schema:
            type: string
        - name: languages
          in: query
          schema:
            type: string
        - name: catalogIds
          in: query
          schema:
            type: string
        - name: pricingAudience
          in: query
          schema:
            type: string
        - name: nationalCloud
          in: query
          schema:
            type: string
        - name: accountId
          in: query
          schema:
            type: string
        - name: orgId
          in: query
          schema:
            type: string
        - name: bgId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Marketplace pricing payload. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/commerceapi/my-org/purchaseService.isFieldLedDeschutes:
    get:
      summary: Get purchase service field-led flag
      description: >-
        Retrieve the boolean purchase-service capability flag used by the marketplace
        experience to tailor available catalog and recommendation behavior.
      operationId: Billing.GetPurchaseServiceFieldLedFlag
      tags: [Billing]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@odata.context':
                    type: string
                  value:
                    type: boolean
                additionalProperties: true
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/syntexbilling/azureSubscriptions/{subscriptionId}/permissions:
    get:
      summary: Get Syntex billing subscription permissions
      description: >-
        Retrieve permissions for a specific Azure subscription used for Syntex/content
        understanding billing (Copilot > Settings).
      operationId: Billing.GetSyntexSubscriptionPermissions
      tags: [Billing]
      parameters:
        - name: subscriptionId
          in: path
          required: true
          description: The Azure subscription identifier.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /_api/v2.1/billingFeatures('M365Backup'):
    get:
      summary: Get Microsoft 365 Backup billing feature
      description: >-
        Retrieve the SharePoint-backed billing feature record used by the Microsoft 365 Backup
        settings experience to determine feature availability and pay-as-you-go state.
      operationId: Billing.GetMicrosoft365BackupFeature
      tags: [Billing]
      x-nodoc-operation-context:
        surface: Settings > Microsoft 365 Backup
        workflows:
          - Open the Microsoft 365 Backup settings experience.
        headerProfile: m365-admin-microsoft-365-backup
        availability:
          level: tenant-conditional
          notes:
            - The live tenant returned a populated feature record even though the blade reported `M365 Backup not enabled`.
        provenance:
          - source: module-validation
            confidence: high
            notes:
              - Validated against the checked-in M365Internals Microsoft 365 Backup cmdlet.
          - source: live-portal-capture
            confidence: high
            notes:
              - Verified against the signed-in `#/Settings/enhancedRestore` route together with the companion enhanced restore and Graph backup reads.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - featureName
                  - isMigrationComplete
                  - isCapacityPackEnabled
                  - hasAttested
                  - attestationMethod
                  - enforceRbac
                properties:
                  '@odata.context':
                    type: string
                  featureName:
                    type: string
                  isMigrationComplete:
                    type: boolean
                  isCapacityPackEnabled:
                    type: boolean
                  hasAttested:
                    type: boolean
                  attestationMethod:
                    type: string
                  enforceRbac:
                    type: boolean
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
