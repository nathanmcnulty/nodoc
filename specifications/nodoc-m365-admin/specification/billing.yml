paths:
  /admin/api/billing/BillingModel:
    get:
      summary: Get billing model
      description: >-
        Retrieve the billing model information for the tenant.
      operationId: Billing.GetBillingModel
      tags: [Billing]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/BillingModelResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/syntexbilling/azureSubscriptions/{subscriptionId}/permissions:
    get:
      summary: Get Syntex billing subscription permissions
      description: >-
        Retrieve permissions for a specific Azure subscription used for Syntex/content
        understanding billing (Copilot > Settings).
      operationId: Billing.GetSyntexSubscriptionPermissions
      tags: [Billing]
      parameters:
        - name: subscriptionId
          in: path
          required: true
          description: The Azure subscription identifier.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /_api/v2.1/billingFeatures('M365Backup'):
    get:
      summary: Get Microsoft 365 Backup billing feature
      description: >-
        Retrieve the SharePoint-backed billing feature record used by the Microsoft 365 Backup
        settings experience to determine feature availability and pay-as-you-go state.
      operationId: Billing.GetMicrosoft365BackupFeature
      tags: [Billing]
      x-nodoc-operation-context:
        surface: Settings > Microsoft 365 Backup
        workflows:
          - Open the Microsoft 365 Backup settings experience.
        headerProfile: m365-admin-microsoft-365-backup
        availability:
          level: tenant-conditional
          notes:
            - The live tenant returned a populated feature record even though the blade reported `M365 Backup not enabled`.
        provenance:
          - source: module-validation
            confidence: high
            notes:
              - Validated against the checked-in M365Internals Microsoft 365 Backup cmdlet.
          - source: live-portal-capture
            confidence: high
            notes:
              - Verified against the signed-in `#/Settings/enhancedRestore` route together with the companion enhanced restore and Graph backup reads.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - featureName
                  - isMigrationComplete
                  - isCapacityPackEnabled
                  - hasAttested
                  - attestationMethod
                  - enforceRbac
                properties:
                  '@odata.context':
                    type: string
                  featureName:
                    type: string
                  isMigrationComplete:
                    type: boolean
                  isCapacityPackEnabled:
                    type: boolean
                  hasAttested:
                    type: boolean
                  attestationMethod:
                    type: string
                  enforceRbac:
                    type: boolean
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
