paths:
  /admin/api/navigation/darkmode:
    get:
      summary: Get dark mode preference
      description: >-
        Retrieve the current user's dark mode preference for the admin portal.
      operationId: Navigation.GetDarkMode
      tags: [Navigation]
      x-nodoc-operation-context:
        surface: Portal shell
        workflows:
          - Open any admin shell page and read the current user's dark mode preference.
        headerProfile: m365-admin-homepage
        availability:
          level: user-context
          notes:
            - The value is specific to the signed-in admin's saved shell preferences.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/DarkModePreference
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/navigation:
    get:
      summary: Get navigation configuration
      description: >-
        Retrieve the navigation configuration for the admin portal, including
        menu items and structure.
      operationId: Navigation.GetNavigation
      tags: [Navigation]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/NavigationResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/navigation/async:
    get:
      summary: Get async navigation items
      description: >-
        Retrieve asynchronously loaded navigation items for the admin portal.
      operationId: Navigation.GetAsyncNavigation
      tags: [Navigation]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/AsyncNavigationResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
