paths:
  /fd/edgeenterprisesitemanagement/api/v2/emiesitelists:
    get:
      summary: Get Edge IE mode site lists
      description: >-
        Retrieve the Enterprise Mode IE site lists configured for Microsoft Edge,
        including sites that require IE mode compatibility.
      operationId: Edge.GetIEModeSiteLists
      tags: [Edge]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - IE mode site lists
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/edgeenterpriseextensionsmanagement/api/policies:
    get:
      summary: Get Edge extension policies
      description: >-
        Retrieve the Microsoft Edge extension management policies, including
        allowed/blocked extensions and installation policies.
      operationId: Edge.GetExtensionPolicies
      tags: [Edge]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: pending - extension policy details
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

