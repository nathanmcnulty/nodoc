      operationId: SharePoint.GetBrandCenterConfig
      tags: [SharePoint]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Brand Center configuration. Exact schema pending.
        4XX:
          $ref: common.yml#/components/responses/ClientException