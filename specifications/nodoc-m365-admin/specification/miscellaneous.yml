paths:
  /admin/api/coordinatedbootstrap/shellinfo:
    get:
      summary: Get shell info
      description: >-
        Retrieve the coordinated bootstrap shell information used to initialize
        the M365 Admin Center portal, including feature flags, user context,
        and available services.
      operationId: Misc.GetShellInfo
      tags: [Miscellaneous]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Shell bootstrap information. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /adminportal/home/ClassicModernAdminDataStream:
    get:
      summary: Get admin home data stream
      description: >-
        Retrieve the admin home page data stream, providing dashboard information
        including service health, message center items, and quick actions.
      operationId: Misc.GetHomeDataStream
      tags: [Miscellaneous]
      parameters:
        - name: ref
          in: query
          description: The referring page path.
          schema:
            type: string
            default: /homepage
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Home data stream. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/dirsyncerrors/listdirsyncerrors:
    post:
      summary: Get directory sync errors
      description: >-
        Retrieve the list of directory synchronization errors for Entra Connect
        (AAD Connect) sync.
      operationId: Misc.GetDirSyncErrors
      tags: [Miscellaneous]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Directory sync errors. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/recommendations/m365/ccs:
    get:
      summary: Get M365 recommendations
      description: >-
        Retrieve Microsoft 365 recommendations from the Central Configuration
        Service (CCS) for improving tenant security and productivity.
      operationId: Misc.GetRecommendations
      tags: [Miscellaneous]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: M365 recommendations. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/offerrec/offer/{id}:
    get:
      summary: Get offer recommendation
      description: >-
        Retrieve a specific offer recommendation by ID, including upgrade
        and cross-sell recommendations from Microsoft.
      operationId: Misc.GetOfferRecommendation
      tags: [Miscellaneous]
      parameters:
        - name: id
          in: path
          required: true
          description: The offer recommendation identifier (e.g., 48, 49).
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Offer recommendation details. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/enhancedRestorev2/v1/featureSetting:
