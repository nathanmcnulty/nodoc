      operationId: Misc.GetARMBillingAccounts
      tags: [Miscellaneous]
      parameters:
        - name: api-version
          in: query
          description: ARM API version.
          schema:
            type: string
            default: '2020-05-01'
      responses:
        '200':
          description: OK
