paths:

  /admin/api/DomainList/Customization:
    get:
      summary: Get domain list customization
      description: >-
        Retrieve domain list customization settings for the admin portal (Domains).
      operationId: Domains.GetDomainListCustomization
      tags: [Domains]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  IsCompactMode:
                    type: boolean
                  ShownColumns:
                    type: array
                    items:
                      type: string
                    nullable: true
                  ColumnsWidth:
                    type: object
                    additionalProperties: true
                    nullable: true
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/Domains/GetDomainBuyModel:
    get:
      summary: Get domain buy model
      description: >-
        Retrieve the domain purchase model information for buying domains (Domains).
      operationId: Domains.GetDomainBuyModel
      tags: [Domains]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  CanPurchaseDomain:
                    type: boolean
                  PurchaseDomainRequiresUserNotification:
                    type: boolean
                  PaidSubscriptionRequired:
                    type: boolean
                  BuyFromResellerPartnerRequired:
                    type: boolean
                  PurchaseUrl:
                    type: string
                  PartnerCompanyName:
                    type: string
                    nullable: true
                  PartnerSupportUrl:
                    type: string
                    nullable: true
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/Domains/List:
    get:
      summary: List domains
      description: >-
        Retrieve the list of domains configured for the tenant (Org Settings > Privacy profile).
      operationId: Domains.ListDomains
      tags: [Domains]
      parameters:
        - name: filter
          in: query
          description: Optional domain filter expression.
          schema:
            type: string
        - name: searchText
          in: query
          description: Optional search text applied by the Domains grid.
          schema:
            type: string
        - name: computeDomainRegistrationData
          in: query
          description: Whether registration metadata should be included in the response.
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    Name:
                      type: string
                    IsDefault:
                      type: boolean
                    IsInitial:
                      type: boolean
                    Capabilities:
                      type: integer
                    Authentication:
                      type: integer
                    Status:
                      type: string
                    DomainType:
                      type: string
                    IsReseller:
                      type: boolean
                    ShouldSetupDns:
                      type: boolean
                    IsSetupCompleted:
                      type: boolean
                    DnsHealthStatus:
                      type: string
                    DnsProviderName:
                      type: string
                  additionalProperties: true
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/Domains/Verified:
    get:
      summary: Get verified domains
      description: >-
        Retrieve the list of verified domains for the tenant (Users > Active).
      operationId: Domains.GetVerifiedDomains
      tags: [Domains]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    Name:
                      type: string
                    IsDefault:
                      type: boolean
                    IsInitial:
                      type: boolean
                    Authentication:
                      type: integer
                    Capabilities:
                      type: integer
                    RootDomain:
                      type: string
                    Status:
                      type: integer
                    VerificationMethod:
                      type: integer
                    PasswordNotificationWindowInDays:
                      type: integer
                      nullable: true
                    PasswordValidityPeriodInDays:
                      type: integer
                      nullable: true
                  additionalProperties: true
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/Domains/Records/Export:
    get:
      summary: Export domain records
      description: >-
        Export domain records in the requested format for a selected domain and capability set.
        The admin portal uses this helper when the Domains experience exports DNS records.
      operationId: Domains.ExportDomainRecords
      tags: [Domains]
      parameters:
        - name: format
          in: query
          required: true
          description: Export format requested by the portal, such as `csv`.
          schema:
            type: string
            default: csv
        - name: domainType
          in: query
          required: true
          description: Domain type sent to the export endpoint.
          schema:
            type: string
        - name: domainName
          in: query
          required: true
          description: Domain name to export records for.
          schema:
            type: string
        - name: domainCapabilities
          in: query
          required: false
          description: Domain capabilities bitmask sent by the portal.
          schema:
            type: integer
            default: 1
        - name: mode
          in: query
          required: false
          description: Export mode sent by the portal.
          schema:
            type: integer
            default: 0
      x-nodoc-operation-context:
        surface: Domains
        workflows:
          - Open the Domains experience and export DNS records for a selected domain.
        headerProfile: m365-admin-homepage
        requestShapes:
          - name: export-domain-records
            bodyKind: none
            requiredParameters:
              - format
              - domainType
              - domainName
            notes: The portal currently uses integer flags for `domainCapabilities` and `mode`.
        provenance:
          - source: module-validation
            confidence: high
            notes:
              - Validated against the checked-in M365Internals domain cmdlet.
      responses:
        '200':
          description: OK
          content:
            text/csv:
              schema:
                type: string
                description: CSV export of domain records when `format=csv`.
            application/json:
              schema:
                type: object
                description: Alternate export payload when a non-CSV format is requested.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
