paths:
  /admin/api/contentunderstanding/autofillsetting:
    get:
      summary: Get autofill settings
      description: >-
        Retrieve the auto-fill settings used by Content Understanding and pay-as-you-go
        experiences.
      operationId: ContentUnderstanding.GetAutoFill
      tags: [ContentUnderstanding]
      x-nodoc-operation-context:
        surface: Copilot > Settings > Content understanding
        workflows:
          - Open pay-as-you-go or Content Understanding settings and inspect AutoFill.
        headerProfile: m365-admin-homepage
        provenance:
          - source: module-validation
            confidence: high
            notes:
              - Validated against the checked-in M365Internals Content Understanding cmdlet.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: AutoFill settings. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

