paths:
  /admin/api/features/initialload:
    get:
      summary: Get initial load feature flags
      description: >-
        Retrieve the feature flags loaded during the initial portal bootstrap.
      operationId: Features.GetInitialLoad
      tags: [Features]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/PortalFeatureFlagMap
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/features/admincontentcdnimagepath:
    get:
      summary: Get admin content CDN image path
      description: >-
        Retrieve the CDN image path used for admin portal content and assets.
      operationId: Features.GetAdminContentCdnImagePath
      tags: [Features]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                format: uri
                example: https://res.cdn.office.net/admincenter/admin-content
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/features/config:
    get:
      summary: Get features configuration
      description: >-
        Retrieve the features configuration for the admin portal.
      operationId: Features.GetConfig
      tags: [Features]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/FeatureConfigResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/features/all:
    get:
      summary: Get all feature flags
      description: >-
        Retrieve all feature flags available for the admin portal.
      operationId: Features.GetAll
      tags: [Features]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/PortalFeatureFlagMap
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
