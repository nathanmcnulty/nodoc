paths:
  /fd/addins/api/apps:
    get:
      summary: Get integrated apps
      description: >-
        Retrieve the list of integrated apps (add-ins) deployed in the tenant.
      operationId: IntegratedApps.GetApps
      tags: [IntegratedApps]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - integrated apps list
        4XX:
          $ref: common.yml#/components/responses/ClientException

  /fd/addins/api/agents:
    get:
      summary: Get deployed agents
      description: >-
        Retrieve the list of agents deployed through the integrated apps platform.
      operationId: IntegratedApps.GetAgents
      tags: [IntegratedApps]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending - agents list
        4XX:
          $ref: common.yml#/components/responses/ClientException

  /fd/addins/api/actionableApps:
