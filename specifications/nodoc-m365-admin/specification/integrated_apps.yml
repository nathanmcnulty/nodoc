paths:
  /fd/addins/api/apps:
    get:
      summary: Get integrated apps
      description: >-
        Retrieve the list of integrated apps (add-ins) deployed in the tenant.
      operationId: IntegratedApps.GetApps
      tags: [IntegratedApps]
      parameters:
        - name: workloads
          in: query
          description: >-
            Comma-separated list of workloads to filter apps by.
            Known values: AzureActiveDirectory, WXPO, MetaOS, SharePoint.
          schema:
            type: string
            default: AzureActiveDirectory,WXPO,MetaOS,SharePoint
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Integrated apps list. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/addins/api/agents:
    get:
      summary: Get deployed agents
      description: >-
        Retrieve the list of agents deployed through the integrated apps platform.
      operationId: IntegratedApps.GetAgents
      tags: [IntegratedApps]
      parameters:
        - name: workloads
          in: query
          description: Workload filter for agents.
          schema:
            type: string
            default: SharedAgent
        - name: scopes
          in: query
          description: Scope filter for agents.
          schema:
            type: string
            default: Shared
        - name: limit
          in: query
          description: Maximum number of agents to return.
          schema:
            type: integer
            default: 200
        - name: creatorId
          in: query
          description: Filter by creator ID. Use 'none' for all creators.
          schema:
            type: string
            default: none
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Agents list. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/addins/api/actionableApps:
    get:
      summary: Get actionable apps
      description: >-
        Retrieve integrated apps that have actionable items requiring admin attention.
      operationId: IntegratedApps.GetActionableApps
      tags: [IntegratedApps]
      parameters:
        - name: workloads
          in: query
          description: Comma-separated workload filter.
          schema:
            type: string
            default: MetaOS,SharedAgent
        - name: limit
          in: query
          description: Maximum number of apps to return.
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Actionable apps list. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/addins/api/availableApps:
    get:
      summary: Get available apps
      description: >-
        Retrieve the list of apps available for deployment from the marketplace.
      operationId: IntegratedApps.GetAvailableApps
      tags: [IntegratedApps]
      parameters:
        - name: workloads
          in: query
          description: Workload filter.
          schema:
            type: string
            default: MetaOS
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Available apps list. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/addins/api/recommendations/appRecommendations:
    get:
      summary: Get app recommendations
      description: >-
        Retrieve recommended apps based on tenant usage patterns and configuration.
      operationId: IntegratedApps.GetRecommendations
      tags: [IntegratedApps]
      parameters:
        - name: appRecommendationType
          in: query
          description: Type of recommendation to retrieve.
          schema:
            type: string
            default: PopularApps
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: App recommendations. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/addins/api/v2/settings:
    get:
      summary: Get integrated apps settings
      description: >-
        Retrieve the integrated apps platform settings including deployment
        preferences, policies, and feature flags.
      operationId: IntegratedApps.GetSettings
      tags: [IntegratedApps]
      parameters:
        - name: keys
          in: query
          description: >-
            Comma-separated list of setting keys to retrieve.
            Known keys: IsTenantEligibleForEntireOrgEmail, AreFirstPartyAppsAllowed,
            AreThirdPartyAppsAllowed, AreLOBAppsAllowed, AreMicrosoftCertified3PAppsAllowed,
            MetaOSCopilotExtensibilitySettings, AdminRoles, AllowOrgWideSharing.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Integrated apps settings. Exact schema pending.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/privatecatalog/GetAddInDetails:
    post:
      summary: Get add-in details
      description: >-
        Retrieve detailed information about a specific add-in from the private catalog (Add-ins > Add-ins).
      operationId: IntegratedApps.GetAddInDetails
      tags: [IntegratedApps]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: pending
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
