paths:
  /admin/api/partners/AOBOClients:
    get:
      summary: Get AOBO partner clients
      description: >-
        Retrieve the list of Admin on Behalf Of (AOBO) partner clients
        associated with the tenant.
      operationId: Partners.GetAOBOClients
      tags: [Partners]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/AOBOClientsResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /fd/MSGraph/beta/directory/partners:
    get:
      summary: List directory partners
      description: >-
        Retrieve the Microsoft Graph beta directory partners collection used by the
        marketplace and partner relationship experiences.
      operationId: Partners.ListDirectoryPartners
      tags: [Partners]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@odata.context':
                    type: string
                  value:
                    type: array
                    items:
                      type: object
                      description: Directory partner record. Exact schema pending.
                additionalProperties: true
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
