          in: query
          description: Reporting period (e.g., D7, D30, D90, D180).
          schema:
            type: string
            enum: [D7, D30, D90, D180]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
