paths:
  /admin/api/reports/GetReportData:
    get:
      summary: Get report data
      description: >-
        Retrieve report data for various entity types. The entityName parameter determines
        which report is returned. Supports Copilot adoption, search metrics, agent usage,
        and other reporting dimensions.
      operationId: Reports.GetReportData
      tags: [Reports]
      parameters:
        - name: entityName
          in: query
          description: >-
            The report entity type to retrieve (camelCase variant). Known values include:
            getCopilotAdoptionByProductsV2, getCopilotAdoptionByDateV2,
            getCopilotEDPAdoptionByPeriodV2, getCopilotEDPAdoptionByDateV2,
            getCopilotThumbsUpRateByDate, getCopilotEDPThumbsUpRateByDate,
            getCopilotAgentActiveUserRL30DailyMetrics, getCopilotAgentActiveAgentRL30Metrics,
            getCopilotAgentActiveUserRL30Metrics, getCopilotAgentActiveUserRL30WoWMetrics,
            getCopilotTenantTopAgentsByDAU.
          schema:
            type: string
        - name: entityname
          in: query
          description: >-
            The report entity type to retrieve (lowercase variant). Known values include:
            getTenantSearchMetric, getMessageConsumptionSummary,
            getDeclarativeAgentConsumptionSummary.
          schema:
            type: string
        - name: pagesize
          in: query
          description: Number of results per page.
          schema:
            type: integer
            default: 100
        - name: period
          in: query
          description: Time period in days for the report.
          schema:
            type: integer
            example: 30
        - name: locale
          in: query
          description: Locale for the report data.
          schema:
            type: string
            default: en-US
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Report data. Schema varies by entityName.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/reports/GetSummaryDataV3:
    get:
      summary: Get summary report data
      description: >-
        Retrieve summary report data for Microsoft 365 services. Supports Copilot activity
        reports and other service-level summaries.
      operationId: Reports.GetSummaryDataV3
      tags: [Reports]
      parameters:
        - name: ServiceId
          in: query
          required: true
          description: The service identifier (e.g., MicrosoftOffice).
          schema:
            type: string
        - name: CategoryId
          in: query
          required: true
          description: The report category (e.g., MicrosoftCopilot, MicrosoftCopilotBCE).
          schema:
            type: string
        - name: Report
          in: query
          required: true
          description: The report name (e.g., CopilotActivityReport, CopilotBCEActivityReport).
          schema:
            type: string
        - name: active_view
          in: query
          description: >-
            The active view within the report. Known values include:
            CopilotAdoptionByProductsV2, CopilotAdoptionByDateV2,
            CopilotEDPAdoptionSummaryByPeriodV2, CopilotBCEAdoptionByPeriodV2,
            CopilotBCEAdoptionByDateV2.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Summary report data. Schema varies by report type.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

