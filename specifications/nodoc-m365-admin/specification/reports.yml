paths:
  /admin/api/reports/GetReportData:
    get:
      summary: Get report data
      description: >-
        Retrieve report data for various entity types. The entityName parameter determines
        which report is returned. Supports Copilot adoption, search metrics, agent usage,
        and other reporting dimensions.
      operationId: Reports.GetReportData
      tags: [Reports]
      parameters:
        - name: entityName
          in: query
          description: >-
            The report entity type to retrieve (camelCase variant). Known values include:
            getCopilotAdoptionByProductsV2, getCopilotAdoptionByDateV2,
            getCopilotEDPAdoptionByPeriodV2, getCopilotEDPAdoptionByDateV2,
            getCopilotThumbsUpRateByDate, getCopilotEDPThumbsUpRateByDate,
            getCopilotAgentActiveUserRL30DailyMetrics, getCopilotAgentActiveAgentRL30Metrics,
            getCopilotAgentActiveUserRL30Metrics, getCopilotAgentActiveUserRL30WoWMetrics,
            getCopilotTenantTopAgentsByDAU.
          schema:
            type: string
        - name: entityname
          in: query
          description: >-
            The report entity type to retrieve (lowercase variant). Known values include:
            getTenantSearchMetric, getMessageConsumptionSummary,
            getDeclarativeAgentConsumptionSummary.
          schema:
            type: string
        - name: pagesize
          in: query
          description: Number of results per page.
          schema:
            type: integer
            default: 100
        - name: period
          in: query
          description: Time period in days for the report.
          schema:
            type: integer
            example: 30
        - name: locale
          in: query
          description: Locale for the report data.
          schema:
            type: string
            default: en-US
      x-nodoc-operation-context:
        surface: Reports
        workflows:
          - Open usage, Copilot, or adoption reports that resolve data through GetReportData.
        headerProfile: m365-admin-homepage
        requestShapes:
          - name: query-driven-report
            bodyKind: none
            requiredParameters:
              - entityName
            notes: The response schema changes with the report selector carried in the query string.
        variants:
          - location: query
            selector: entityName
            notes: Camel-case selector used by most Copilot and agent reports.
          - location: query
            selector: entityname
            notes: Lowercase selector variant still appears on some report families.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Report data. Schema varies by entityName.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/reports/GetSummaryDataV3:
    get:
      summary: Get summary report data
      description: >-
        Retrieve summary report data for Microsoft 365 services. Supports Copilot activity
        reports and other service-level summaries.
      operationId: Reports.GetSummaryDataV3
      tags: [Reports]
      parameters:
        - name: ServiceId
          in: query
          required: true
          description: The service identifier (e.g., MicrosoftOffice).
          schema:
            type: string
        - name: CategoryId
          in: query
          required: true
          description: The report category (e.g., MicrosoftCopilot, MicrosoftCopilotBCE).
          schema:
            type: string
        - name: Report
          in: query
          required: true
          description: The report name (e.g., CopilotActivityReport, CopilotBCEActivityReport).
          schema:
            type: string
        - name: active_view
          in: query
          description: >-
            The active view within the report. Known values include:
            CopilotAdoptionByProductsV2, CopilotAdoptionByDateV2,
            CopilotEDPAdoptionSummaryByPeriodV2, CopilotBCEAdoptionByPeriodV2,
            CopilotBCEAdoptionByDateV2.
          schema:
            type: string
      x-nodoc-operation-context:
        surface: Reports
        workflows:
          - Open usage or Copilot summaries that resolve data through GetSummaryDataV3.
        headerProfile: m365-admin-homepage
        requestShapes:
          - name: summary-report
            bodyKind: none
            requiredParameters:
              - ServiceId
              - CategoryId
              - Report
            notes: The response schema changes with the service, category, report, and active view combination.
        variants:
          - location: query
            selector: active_view
            notes: Active view selects the rendered summary slice inside the same report family.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Summary report data. Schema varies by report type.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/reports/productivityScoreConfig/GetProductivityScoreConfig:
    get:
      summary: Get Productivity Score configuration
      description: >-
        Retrieve the Productivity Score (Adoption Score) configuration for the tenant.
      operationId: Reports.GetProductivityScoreConfig
      tags: [Reports]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/ProductivityScoreConfigResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /admin/api/admindashboard/preferences:
    get:
      summary: Get admin dashboard preferences
      description: >-
        Retrieve admin dashboard preferences for the current user.
      operationId: Reports.GetAdminDashboardPreferences
      tags: [Reports]
      x-nodoc-operation-context:
        surface: Dashboard
        workflows:
          - Open the admin homepage dashboard and read saved user preferences.
        headerProfile: m365-admin-homepage
        availability:
          level: user-context
          notes:
            - Preferences are scoped to the signed-in administrator rather than the whole tenant.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/AdminDashboardPreferencesResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

