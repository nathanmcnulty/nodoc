openapi: 3.0.1
info:
  title: Teams
  x-nodoc-category: Teams
  description: |
    The Teams specification documents internal APIs exercised by the Microsoft Teams admin center
    (`admin.teams.microsoft.com`) during an exhaustive crawl of the left nav, detail pages, and
    report interactions with a real authenticated Edge session.

    The current capture set confirmed multiple distinct backend families behind the portal, including:

      - same-origin admin portal APIs on `admin.teams.microsoft.com` and `noneu-admin.teams.microsoft.com`
      - cross-origin Teams platform calls on `teams.microsoft.com/api`
      - user, policy, telephony, CQD, template, and app-instance lookups on
        `api.interfaces.records.teams.microsoft.com`
      - frontline orchestration, device management, monetization, monitoring, reports, app catalog,
        CQD data, and planning backends on additional Teams- and Office-hosted services

    The retained evidence includes explicit notes for feature-, data-, or permission-gated surfaces
    such as Silent Tests, inactive Teams rule details, workforce hierarchy operations, and device
    tenant metadata that did not fully resolve in the capture tenant.

    Most cross-origin calls were observed with a browser-acquired bearer token and `X-Requested-With`
    header. `POST /api/log` was only observed as a same-origin request from the admin portal itself and
    should be treated as portal-context dependent rather than a general-purpose external API.

    Documentation and specifications have been provided on a best-efforts basis and may not be
    100% accurate.
  version: 0.1.0
  contact:
    name: nodoc
    url: https://github.com/nathanmcnulty/nodoc
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://admin.teams.microsoft.com
    description: Teams admin center entrypoint. Most path items override this with the exact host used by the portal.
security:
  - TeamsPortalBearer: []
components:
  securitySchemes:
    TeamsPortalBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Browser-issued bearer token observed on most Teams admin center cross-origin service calls,
        typically alongside `X-Requested-With: XMLHttpRequest`.
    TeamsPortalContext:
      type: apiKey
      in: header
      name: X-Requested-With
      description: |
        Same-origin Teams admin center portal context. `POST /api/log` was captured without an explicit
        `Authorization` header in the exported request headers and should be treated as a portal-context
        dependent operation.
  parameters:
    TenantId:
      name: tenantId
      in: path
      required: true
      description: Entra tenant identifier for the current Teams admin tenant.
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      description: Entra object identifier for a Teams user.
      schema:
        type: string
        format: uuid
    Partition:
      name: partition
      in: path
      required: true
      description: Teams regional partition returned by `POST /api/authsvc/v1.0/users/region`.
      schema:
        type: string
        example: amer-03
    Version:
      name: version
      in: path
      required: true
      description: Configuration schema version requested by the portal.
      schema:
        type: string
        example: 1.0.0.0
    AppId:
      name: appId
      in: query
      required: false
      description: Optional virtual appointments application identifier.
      schema:
        type: string
        example: sharedsms
    Select:
      name: $select
      in: query
      required: false
      description: Comma-separated property projection.
      schema:
        type: string
        example: usageLocation
    Locale:
      name: locale
      in: query
      required: false
      description: Locale requested by the Teams admin portal.
      schema:
        type: string
        example: en-US
    Aggregate:
      name: Aggregate
      in: query
      required: false
      description: Reporting aggregation window.
      schema:
        type: string
        example: M7
    TenantIdQuery:
      name: tenantId
      in: query
      required: true
      description: Tenant identifier required by report helper endpoints.
      schema:
        type: string
        format: uuid
    TenantIdLowerQuery:
      name: tenantid
      in: query
      required: true
      description: Lowercase tenant identifier query parameter used by report bootstrap endpoints.
      schema:
        type: string
        format: uuid
    Top:
      name: $top
      in: query
      required: false
      description: Maximum number of items to return.
      schema:
        type: integer
        example: 800
    OrderBy:
      name: $orderby
      in: query
      required: false
      description: OData ordering clause.
      schema:
        type: string
        example: AggregationStartTime
    Filter:
      name: $filter
      in: query
      required: false
      description: OData-style filter clause.
      schema:
        type: string
        example: AggregationEndTime ge 2026-03-05T00:00:00.000Z
    Count:
      name: Count
      in: query
      required: false
      description: Maximum number of available filter values to consider.
      schema:
        type: integer
        example: 20
    ResultSize:
      name: ResultSize
      in: query
      required: false
      description: Number of filter rows to return.
      schema:
        type: integer
        example: 10
    PopulateNumberOfVoiceUsers:
      name: PopulateNumberOfVoiceUsers
      in: query
      required: false
      description: Include voice user counts in civic-address filter results.
      schema:
        type: boolean
        example: true
    PopulateNumberOfTelephoneNumbers:
      name: PopulateNumberOfTelephoneNumbers
      in: query
      required: false
      description: Include telephone number counts in civic-address filter results.
      schema:
        type: boolean
        example: true
    AgentsMicrosoftTeams:
      name: agents
      in: query
      required: true
      description: Config workload requested from the Teams config service.
      schema:
        type: string
        example: TeamsClientMwtPackages
    AgentsSkype:
      name: agents
      in: query
      required: true
      description: Config workload requested from the Teams Skype virtual visits config service.
      schema:
        type: string
        example: MicrosoftTeamsVVM
    AudienceGroup:
      name: AudienceGroup
      in: query
      required: false
      description: Configuration audience ring requested by the portal.
      schema:
        type: string
        example: ring0
    Debug:
      name: Debug
      in: query
      required: false
      description: Debug flag used by config service requests.
      schema:
        type: boolean
        example: false
    Environment:
      name: Environment
      in: query
      required: false
      description: Requested Teams service environment.
      schema:
        type: string
        example: prod
    TenantIdUpperQuery:
      name: TenantID
      in: query
      required: true
      description: Tenant identifier parameter used by Teams config service calls.
      schema:
        type: string
        format: uuid
    CountryCode:
      name: countryCode
      in: path
      required: true
      description: Country or market code used by Teams telephony brief endpoints.
      schema:
        type: string
        example: us
    PolicyType:
      name: policyType
      in: path
      required: true
      description: Teams policy or configuration family requested from the records service.
      schema:
        type: string
        example: TeamsMeetingPolicy
    PolicyName:
      name: policyName
      in: path
      required: true
      description: Specific named policy instance requested from a configuration family.
      schema:
        type: string
        example: Global
    TelephonyResource:
      name: telephonyResource
      in: path
      required: true
      description: Tenant telephony resource requested from the telephone-number management service.
      schema:
        type: string
        enum:
          - kyc-briefs
          - phone-number-tag
          - telephone-number-aggregation
          - telephone-numbers
        example: telephone-numbers
    BriefType:
      name: briefType
      in: path
      required: true
      description: Campaign or brand brief type requested for the selected country.
      schema:
        type: string
        enum:
          - tendlc-brand-briefs
          - tendlc-campaign-briefs
        example: tendlc-brand-briefs
    CatalogAppId:
      name: catalogAppId
      in: path
      required: true
      description: Teams app catalog identifier observed on manage-apps detail pages.
      schema:
        type: string
        format: uuid
    OfferId:
      name: offerId
      in: path
      required: true
      description: Add-on monetization offer identifier requested by the Teams admin center.
      schema:
        type: string
        example: amplitudenetlda1624641062570.myteamstv
    LookbackDays:
      name: lookbackDays
      in: path
      required: true
      description: Real-time analytics lookback interval used by the communications summary route.
      schema:
        type: integer
        example: 7
    LocaleCode:
      name: localeCode
      in: path
      required: true
      description: Locale segment requested from the Teams templates API.
      schema:
        type: string
        example: en-US
  responses:
    Unauthorized:
      description: The Teams portal bearer token or session context was invalid or expired.
    Forbidden:
      description: The authenticated principal lacks the required Teams admin permissions.
    BadRequest:
      description: The request shape or parameters were invalid.
    NotFound:
      description: |
        The route family was live, but the requested tenant slice, entity, or feature-gated resource
        was unavailable in the current capture tenant.
    NoContent:
      description: The request succeeded and intentionally returned no body.
    InternalServerError:
      description: The backend returned an unexpected error for the observed tenant state or request.
    UnprocessableContent:
      description: |
        The route was live but rejected the current query shape or contextual state. This was observed
        on the virtual visits aggregate-records query captured from the dashboard widget.
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    GenericArrayItem:
      type: object
      additionalProperties: true
    TeamsPortalLogRequest:
      type: object
      description: Portal telemetry and bootstrap timing payload emitted by the Teams admin shell.
      properties:
        duration:
          type: integer
          example: 26
        status:
          type: string
          example: Succeed
        cdnUrl:
          type: string
          format: uri
          example: https://res.cdn.office.net/s01-itpro-tac-ui/1.0.260331.4/
        uiConfig:
          $ref: '#/components/schemas/GenericObject'
      additionalProperties: true
    TeamsUserPreference:
      type: object
      description: Stored dashboard and carousel preferences for the current Teams admin user.
      properties:
        carousel:
          type: array
          items:
            $ref: '#/components/schemas/GenericArrayItem'
        dashboards:
          $ref: '#/components/schemas/GenericObject'
      additionalProperties: true
    TeamsUserSettings:
      type: object
      description: Saved column-width, visibility, and grid preferences for Teams admin experiences.
      properties:
        tables:
          $ref: '#/components/schemas/GenericObject'
      additionalProperties: true
    TeamsRegionResponse:
      type: object
      description: Teams region, partition, and service-discovery hints for the current admin.
      properties:
        region:
          type: string
          example: amer
        partition:
          type: string
          example: amer03
        regionGtms:
          $ref: '#/components/schemas/GenericObject'
      additionalProperties: true
    TeamsEngagementSurfacesResponse:
      type: object
      description: User engagement state used by the Teams admin portal shell.
      properties:
        engagementSurfaces:
          type: array
          items:
            $ref: '#/components/schemas/GenericArrayItem'
        userState:
          $ref: '#/components/schemas/GenericObject'
        displayed:
          type: array
          items:
            $ref: '#/components/schemas/GenericArrayItem'
      additionalProperties: true
    AppAccessRequestsResponse:
      type: object
      description: Pending Teams app access requests surfaced by the admin center.
      properties:
        appAccessRequests:
          type: array
          items:
            $ref: '#/components/schemas/GenericArrayItem'
      additionalProperties: true
    TeamsTenantRecord:
      type: object
      description: Tenant-wide Teams record returned by the interfaces records service.
      properties:
        assignedPlans:
          type: array
          items:
            $ref: '#/components/schemas/GenericArrayItem'
      additionalProperties: true
    TeamsUserRecord:
      type: object
      description: Teams user record returned by the interfaces records service.
      properties:
        assignedPlans:
          type: array
          items:
            $ref: '#/components/schemas/GenericArrayItem'
      additionalProperties: true
    TelephoneNumberAggregationResponse:
      type: object
      description: Tenant telephone number summary used by Teams telephony views.
      properties:
        TotalCount:
          type: integer
          example: 0
        AssignmentAvailability:
          $ref: '#/components/schemas/GenericObject'
        AssignmentStatus:
          $ref: '#/components/schemas/GenericObject'
        IsoCountryCodes:
          type: array
          items:
            type: string
      additionalProperties: true
    TeamsClusterLookupResponse:
      type: object
      description: Regional monitoring platform base URL lookup.
      properties:
        data:
          type: object
          properties:
            baseUrlList:
              type: object
              additionalProperties:
                type: string
          additionalProperties: true
      additionalProperties: true
    TeamsConfigResponse:
      type: object
      description: Feature and flight configuration returned by the Teams config service.
      properties:
        Headers:
          $ref: '#/components/schemas/GenericObject'
        ConfigIDs:
          $ref: '#/components/schemas/GenericObject'
      additionalProperties: true
    TeamsRegionalHostResponse:
      type: object
      description: Resolver response that maps the tenant to a regional Teams service host.
      properties:
        '@odata.context':
          type: string
          nullable: true
        value:
          type: string
          example: amer-ehrconnectorsvc.teams.microsoft.com
      additionalProperties: true
    ReportsHostResponse:
      type: object
      description: Report-host bootstrap result used by Teams premium reporting widgets.
      properties:
        host:
          type: string
          format: uri
          example: https://REPORTSNCU.OFFICE.COM
      additionalProperties: true
    ODataValueCollection:
      type: object
      description: Generic OData-style collection wrapper returned by report endpoints.
      properties:
        '@odata.context':
          type: string
        value:
          type: array
          items:
            $ref: '#/components/schemas/GenericArrayItem'
      additionalProperties: true
    TeamsAppCatalogEntry:
      type: object
      description: Teams app catalog assignment and deployment state.
      properties:
        id:
          type: string
          format: uuid
        isActive:
          type: boolean
        appType:
          type: string
          example: GlobalCatalogApp
        appAssignmentInfo:
          $ref: '#/components/schemas/GenericObject'
        appDeploymentInfo:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/GenericObject'
      additionalProperties: true
    TeamsAppCatalogEntries:
      type: array
      items:
        $ref: '#/components/schemas/TeamsAppCatalogEntry'
    TeamsAppCatalogStatusResponse:
      type: object
      description: Admin app catalog migration and alignment state.
      properties:
        tenantStatus:
          $ref: '#/components/schemas/GenericObject'
        acmUiStatus:
          $ref: '#/components/schemas/GenericObject'
      additionalProperties: true
    TeamsJobsResponse:
      type: object
      description: Jobs collection used by the Teams tags service.
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/GenericArrayItem'
      additionalProperties: true
    CapabilityRequest:
      type: object
      description: Capability lookup body used by Teams virtual appointments monetization checks.
      required:
        - Type
      properties:
        Type:
          type: string
          example: premiumva
      additionalProperties: true
