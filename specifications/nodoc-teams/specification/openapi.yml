externalDocs:
  description: Checked-in source specification and supporting modules.
  url: https://github.com/nathanmcnulty/nodoc/tree/main/specifications/nodoc-teams/specification

x-nodoc-headerProfiles:
  teams-admin-portal-context:
    description: Same-origin Teams admin center shell profile used by shell-bound requests on the admin portal hosts.
    requiredHeaders:
      - name: X-Requested-With
        value: XMLHttpRequest
        description: Same-origin AJAX context emitted by the Teams admin portal shell.
    notes:
      - The authenticated browser session on admin.teams.microsoft.com or noneu-admin.teams.microsoft.com carries the primary portal state for these requests.
  teams-service-bearer:
    description: Browser-issued Teams service profile used by cross-origin Teams platform and regional admin service calls.
    requiredHeaders:
      - name: Authorization
        description: Browser-issued bearer token for the requested Teams service audience.
      - name: X-Requested-With
        value: XMLHttpRequest
        description: AJAX context observed on Teams service requests.
    observedHeaders:
      - name: Referer
        value: https://admin.teams.microsoft.com/
        description: Root Teams admin referer emitted by authenticated browsing.
    notes:
      - Different backend families can require different bearer audiences even when the portal workflow is the same.
paths:
  # admin.teams.microsoft.com/api
  /api/log:
    servers:
      - url: https://admin.teams.microsoft.com
        description: Same-origin Teams admin center host
    post:
      security:
        - TeamsPortalContext: []
      tags: [AdminTeamsPortal]
      summary: Record Teams admin portal shell telemetry
      description: |
        Same-origin logger observed on the dashboard, users, activity log, usage report, and best-practice
        routes. The request body carried timing, permissions, flights, and page bootstrap state for the
        currently rendered admin experience.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamsPortalLogRequest'
      x-nodoc-operation-context:
        surface: Portal shell
        workflows:
          - Open dashboard, users, activity log, usage report, or best-practice pages while the Teams admin shell records bootstrap and timing state.
        headerProfile: teams-admin-portal-context
        requestShapes:
          - name: teams-shell-telemetry
            contentType: application/json
            bodyKind: telemetry-envelope
            notes: The payload carries timing, permission, flight, and rendered-page bootstrap state for the active admin experience.
        availability:
          level: request-dependent
          notes:
            - The route was observed as a shell-bound telemetry sink rather than as a reusable tenant data API.
        provenance:
          - source: live-portal-capture
            confidence: high
            notes:
              - Verified during authenticated Teams admin browsing on dashboard, users, activity log, usage report, and best-practice routes.
      responses:
        '200':
          description: Telemetry payload accepted.
        '400':
          $ref: '#/components/responses/BadRequest'

  # noneu-admin.teams.microsoft.com/api
  /api/v1/usersettings:
    servers:
      - url: https://noneu-admin.teams.microsoft.com
        description: Regional Teams admin preference service
    get:
      tags: [RegionalAdmin]
      summary: Get saved Teams admin grid settings
      description: |
        Returns saved column widths, visibility preferences, and other table-level settings for Teams admin
        center pages such as users and activity log.
      responses:
        '200':
          description: User settings payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamsUserSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/userpreference:
    servers:
      - url: https://noneu-admin.teams.microsoft.com
        description: Regional Teams admin preference service
    get:
      tags: [RegionalAdmin]
      summary: Get Teams admin dashboard preferences
      description: |
        Retrieves saved dashboard and carousel layout preferences for the signed-in Teams admin.
      responses:
        '200':
          description: User preference payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamsUserPreference'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      tags: [RegionalAdmin]
      summary: Update Teams admin dashboard preferences
      description: |
        Persists dashboard layout preferences for the current Teams admin user. Observed during dashboard
        layout persistence and should be treated as a real write.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamsUserPreference'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/DeploymentTeams:
    servers:
      - url: https://noneu-admin.teams.microsoft.com
