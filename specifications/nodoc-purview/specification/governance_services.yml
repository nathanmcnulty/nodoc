paths:
  /gws/ComplianceAuthServer/v1.0/IsAllowedPermissionWithScopes:
    post:
      operationId: checkPermissionWithScopes
      summary: Check if user has permission with scopes
      description: >-
        Check whether the current user has a specific permission with the given scopes.
        Used for authorization decisions within the Governance Web Services.
      tags: [GovernanceServices]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: pending
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/GovernanceRolesWithScopeInfoResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /gws/ComplianceAuthServer/v1.0/GetUserRolesWithScopeInfo:
    post:
      operationId: getUserRolesWithScopeInfo
      summary: Get user roles with scope information
      description: >-
        Retrieve the current user's roles along with their associated scope information.
        Returns detailed role assignments including administrative unit scoping.
      tags: [GovernanceServices]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: pending
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /gws/ComplianceAuthServer/v1.0/GetGrantedPermissions:
    post:
      operationId: getGrantedPermissions
      summary: Get granted permissions
      description: >-
        Retrieve granted permissions shown by Purview's Data Loss Prevention
        role-group drill-in experience.
      tags: [GovernanceServices]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: pending
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /gws/ComplianceAuthServer/v1.0/GetUserRoles:
    post:
      operationId: getUserRoles
      summary: Get user roles
      description: >-
        Retrieve user role assignments shown by Purview's Data Loss Prevention
        role-group drill-in experience.
      tags: [GovernanceServices]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: pending
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
