paths:
  /cpm/v1.0/Tenant/CompliancePostureSummary:
    post:
      operationId: getTenantCompliancePostureSummary
      summary: Get tenant compliance posture summary
      description: >-
        Retrieve the compliance posture summary for the tenant from Compliance Manager.
        Returns an overview of the tenant's compliance score and assessment status.
      tags: [ComplianceManager]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Compliance posture summary query options. No request body fields were required in the captured portal sample.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/CompliancePostureSummaryResponse
              example:
                overallScore:
                  passedActionsCount: 806
                  pendingActionsCount: 907
                  notInScopeActionsCount: 25
                  id: Overall
                  title: Overall
                  description: ''
                  aggregatedAchievedScore: 14503.81
                  aggregatedMaxScore: 26509
                  aggregatedScorePercentage: 54.71
                serviceSummary:
                  - id: 8c289e92-a159-4ee2-a9a9-c34b4467b952
                    title: Microsoft 365
                    description: ''
                    aggregatedAchievedScore: 14503.81
                    aggregatedMaxScore: 26509
                    aggregatedScorePercentage: 54.71
                regulationSummary:
                  - id: afc141a2-0a10-4406-b4ba-8c8e323e337c
                    title: AI Baseline
                    description: ''
                    aggregatedAchievedScore: 1738
                    aggregatedMaxScore: 2674
                    aggregatedScorePercentage: 64.99
                solutionCategorySummary: []
                solutionSummaryMap: []
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cpm/v1.0/ApplicationUserContext:
    get:
      operationId: getApplicationUserContext
      summary: Get application user context
      description: >-
        Retrieve the application user context for Compliance Manager.
        Returns information about the current user's permissions and access level.
      tags: [ComplianceManager]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/ComplianceApplicationUserContext
              example:
                userInfo:
                  id: 00000000-0000-0000-0000-000000000000
                  userPrincipalName: ''
                  anonymousId: anon-00000000000000000000000000000000
                  primaryText: ''
                tenantInfo:
                  hasEnrolledForTrial: false
                  isInitialSetupCreated: true
                  hasCopilotLicense: true
                  isAIBaselineCreated: true
                  license: E5
                  isTenantLicenseSuccess: true
                  isLicenseCheckDisabled: false
                  isTrialActive: false
                  trialEnrollmentLink: https://admin.microsoft.com/Adminportal/Home?#/catalog/offer-details/compliance-manager-premium-assessment-add-on/00000000-0000-0000-0000-000000000000
                  maxTotalEvidenceFileUploadSizeInBytes: 1073741824
                  tenantContentUpdateState: None
                scopedAuthorizationRights:
                  '/ComplianceManagerV3/Master':
                    - Create
                    - Modify
                    - Delete
                    - Approve
                  '/ComplianceManager/Customer':
                    - Delete
                    - Archive
                    - Assess
                    - Create
                    - Modify
                    - Read
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cpm/v1.0/Assessments/List:
    post:
      operationId: listComplianceAssessments
      summary: List compliance assessments
      description: >-
        Retrieve a list of compliance assessments from Compliance Manager.
        Assessments track the tenant's progress against regulatory frameworks and standards.
      tags: [ComplianceManager]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Assessment list query options. The captured Compliance Manager request succeeded with an empty object body.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/ComplianceAssessmentsResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cpm/v1.0/Users/Profile:
    get:
      operationId: getComplianceManagerUserProfile
      summary: Get user profile in Compliance Manager
      description: >-
        Retrieve the user profile for the current user in Compliance Manager.
        Includes user preferences and role information.
      tags: [ComplianceManager]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/ComplianceManagerUserProfile
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cpm/v1.0/Tenant/Filters:
    get:
      operationId: getTenantAssessmentFilters
      summary: Get tenant assessment filters
      description: >-
        Retrieve the available filter options for tenant assessments in Compliance Manager.
        Returns filter categories such as regulation, status, and assessment type.
      tags: [ComplianceManager]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/ComplianceFiltersResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cpm/v1.0/Regulations/PremiumRegulationSummary:
    get:
      operationId: getPremiumRegulationSummary
      summary: Get premium regulation consumption summary
      description: >-
        Retrieve Compliance Manager premium regulation consumption and entitlement data.
        Confirmed from the Regulations and AI Regulations entry points on the overview page.
      tags: [ComplianceManager]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/CompliancePremiumRegulationSummaryResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cpm/v1.0/RegulationTemplates:
    get:
      operationId: listRegulationTemplates
      summary: List regulation templates
      description: >-
        Retrieve the regulation templates catalog shown by Compliance Manager. The
        observed Purview flow requested premium templates and optionally included
        predeployment templates.
      tags: [ComplianceManager]
      parameters:
        - name: includePredeploymentTemplates
          in: query
          required: false
          description: Include templates that are not yet fully deployed in the tenant.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/ComplianceRegulationTemplatesResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /Ingestion/NativeConnectorJob:
    get:
      operationId: getNativeConnectorJobStatus
      summary: Get native connector ingestion job status
      description: >-
        Retrieve the status of a native connector ingestion job.
        Used to track the progress of data ingestion from native connectors.
      tags: [ComplianceManager]
      parameters:
        - name: correlationId
          in: query
          required: false
          description: A correlation identifier for tracking the job.
          schema:
            type: string
            format: uuid
        - name: locale
          in: query
          required: false
          description: The locale for localized response content.
          schema:
            type: string
            example: en-us
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Native connector ingestion job status envelope returned while the portal tracks a correlation ID.
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cpm/v1.0/Reporting/Export:
    post:
      operationId: exportComplianceManagerHistoryReport
      summary: Export compliance history report
      description: >-
        Export Compliance Manager history report data from the History reports
        page.
      tags: [ComplianceManager]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: pending
      responses:
        '200':
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
