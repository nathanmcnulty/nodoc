  /di/find/DlpAlertAgentPolicyInsights:
    get:
      operationId: getDlpAlertAgentPolicyInsights
      summary: Get DLP alert agent policy insights
      description: >-
        Retrieve DLP alert agent policy insights from the Data Infrastructure service.
        Returns policy insight data used for DLP alert analysis.
      tags: [DataInfrastructure]
      parameters:
        - name: tenantId
          in: query
          required: true
          description: The unique identifier (GUID) of the tenant.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/DlpAlertAgentPolicyInsightsResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

