      tags: [Billing]
      parameters:
        - name: date
          in: query
          required: false
          description: The reporting timestamp used by the license usage blade.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

