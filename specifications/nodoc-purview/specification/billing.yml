          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cbill/LicenseUsage/E5TenantSolutionBreakdown:
    get:
      operationId: getE5TenantSolutionBreakdown
      summary: Get E5 tenant solution breakdown
      description: >-
        Retrieve the E5 solution breakdown shown by Purview's License Usage
