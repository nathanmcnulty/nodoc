paths:
  /cbill/purview/offer/freetrial:
    get:
      operationId: checkFreeTrialAvailability
      summary: Check Purview free trial offer availability
      description: >-
        Check whether the Purview free trial offer is available for the tenant.
        Returns the availability status and trial offer details.
      tags: [Billing]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cbill/PurviewAccount:
    get:
      operationId: getPurviewBillingAccount
      summary: Get Purview billing account info
      description: >-
        Retrieve Purview billing account information.
        Returns the billing account details and subscription status.
      tags: [Billing]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cbill/PurviewAccount/billing-config-details:
    get:
      operationId: getPurviewBillingConfigDetails
      summary: Get Purview billing configuration details
      description: >-
        Retrieve detailed billing configuration for the Purview account.
        Returns meter usage, capacity units, and billing tier information.
      tags: [Billing]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cbill/CbsReport/ReportingAPI/GetAggregates:
    post:
      operationId: getPurviewBillingAggregates
      summary: Get Purview pay-as-you-go usage aggregates
      description: >-
        Retrieve pay-as-you-go billing aggregates for Purview usage report
        blades, including the Audit pay-as-you-go usage experience.
      tags: [Billing]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: pending
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cbill/LicenseUsage/E5TenantUsage:
    get:
      operationId: getE5TenantUsage
      summary: Get E5 tenant usage summary
      description: >-
        Retrieve the E5 tenant usage summary shown by Purview's License Usage
        report.
      tags: [Billing]
      parameters:
        - name: date
          in: query
          required: false
          description: The reporting timestamp used by the license usage blade.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cbill/LicenseUsage/E5TenantLicenseBreakdown:
    get:
      operationId: getE5TenantLicenseBreakdown
      summary: Get E5 tenant license breakdown
      description: >-
        Retrieve the E5 license breakdown shown by Purview's License Usage
