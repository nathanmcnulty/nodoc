paths:
  /medeina/auth:
    get:
      operationId: checkCopilotAuth
      summary: Check Copilot authentication status
      description: >-
        Check the authentication status for Security Copilot (Medeina).
        Returns whether the current user has a valid authentication session.
      tags: [Copilot]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /medeina/auth/expiryDate:
    get:
      operationId: getCopilotAuthExpiryDate
      summary: Get Copilot auth token expiry date
      description: >-
        Retrieve the expiry date of the current Security Copilot authentication token.
        Used to determine when re-authentication is required.
      tags: [Copilot]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /medeina/settings/datashare:
    get:
      operationId: getCopilotDataShareSettings
      summary: Get Copilot data sharing settings
      description: >-
        Retrieve the data sharing settings for Security Copilot.
        Controls how data is shared between Copilot and other Microsoft services.
      tags: [Copilot]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /medeina/agents:
    get:
      operationId: listCopilotAgents
      summary: List Copilot agents
      description: >-
        Retrieve a list of available Security Copilot agents.
        Supports filtering by scope and agent definition name, with optional expansion of related data.
      tags: [Copilot]
      parameters:
        - name: scope
          in: query
          required: false
          description: The scope to filter agents by.
          schema:
            type: string
        - name: agentDefinitionName
          in: query
          required: false
          description: The agent definition name to filter by.
          schema:
            type: string
        - name: expand
          in: query
          required: false
          description: Related entities to expand in the response.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /cdssecuritycopilot/trial:
    get:
      operationId: getSecurityCopilotTrialStatus
      summary: Get Security Copilot trial status
      description: >-
        Retrieve the trial status for Security Copilot (CDS).
        Returns whether a trial is available, active, or expired for the tenant.
      tags: [Copilot]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /securityplatform/provisioning/account:
    get:
      operationId: getSecurityPlatformAccount
      summary: Get Security Platform account
      description: >-
        Retrieve the tenant-level Security Platform account used by the Purview
        Security Copilot and AI experiences.
      tags: [Copilot]
      parameters:
        - name: api-version
          in: query
          required: false
          description: Security Platform API version used by the portal call.
          schema:
            type: string
            example: 2024-03-01-preview
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/SecurityPlatformAccountResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /securityplatform/workspaces:
    get:
      operationId: listSecurityPlatformWorkspaces
      summary: List Security Platform workspaces
      description: >-
        Retrieve Security Platform workspaces available to the current tenant. The
        captured Purview response exposed the `security-copilot` workspace together
        with opt-in configuration and management endpoint details.
      tags: [Copilot]
      parameters:
        - name: api-version
          in: query
          required: false
          description: Security Platform API version used by the portal call.
          schema:
            type: string
            example: 2023-12-01-preview
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/SecurityPlatformWorkspacesResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /securityplatform/sentinelgraph/provisioning/checkTenant:
    post:
      operationId: checkSecurityPlatformTenantProvisioning
      summary: Check Security Platform tenant provisioning
      description: >-
        Evaluate whether the tenant can enable Security Platform graph-backed features.
        Purview called this endpoint with an empty body while asking for eligible features.
      tags: [Copilot]
      parameters:
        - name: api-version
          in: query
          required: false
          description: Security Platform API version used by the portal call.
          schema:
            type: string
            example: 2024-07-01
        - name: includeFeatures
          in: query
          required: false
          description: Include the feature-level eligibility breakdown in the response.
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Captured samples sent an empty JSON object.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: common.yml#/components/schemas/SecurityPlatformCheckTenantResponse
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound
