paths:
  "/insiderrisk/insiderrisk/api/v1.0/{tenantId}/InsiderRiskAnalyticsInsightMetadata('{date}')":
    get:
      operationId: getInsiderRiskAnalyticsInsightMetadata
      summary: Get insider risk analytics insight metadata
      description: >-
        Retrieve insider risk analytics insight metadata for a specific date.
        Returns metadata about available risk analytics insights for the tenant.
      tags: [InsiderRisk]
      parameters:
        - name: tenantId
          in: path
          required: true
          description: The unique identifier (GUID) of the tenant.
          schema:
            type: string
            format: uuid
        - name: date
          in: path
          required: true
          description: The date for which to retrieve insight metadata (ISO 8601 date format).
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                description: Plain-text message returned when no analytics insight metadata exists for the requested date.
                example: 'Could not find tenant analytics insight: InsightsMetadata, query date: 2026-04-01.'
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

  /insiderrisk/insiderrisk/api/v1.0/{tenantId}/ExtensibleIndicators:
    get:
      operationId: listExtensibleIndicators
      summary: List extensible indicators
      description: >-
        Retrieve extensible Insider Risk indicators used by Purview's Insider
        Risk application settings experience.
      tags: [InsiderRisk]
      parameters:
        - name: tenantId
          in: path
          required: true
          description: The unique identifier (GUID) of the tenant.
          schema:
            type: string
            format: uuid
        - name: $filter
          in: query
          required: false
          description: OData-style filter expression used to limit returned indicators.
          schema:
            type: string
        - name: $top
          in: query
          required: false
          description: The maximum number of indicators to return.
          schema:
            type: integer
        - name: includeDeleted
          in: query
          required: false
          description: Include deleted indicators in the result set.
          schema:
            type: boolean
        - name: pageSize
          in: query
          required: false
          description: Page size used by the settings blade.
          schema:
            type: integer
        - name: type
          in: query
          required: false
          description: Indicator type filter applied by the settings blade.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: pending
        '401':
          $ref: common.yml#/components/responses/Unauthorized

        '403':
          $ref: common.yml#/components/responses/Forbidden

        '404':
          $ref: common.yml#/components/responses/NotFound

